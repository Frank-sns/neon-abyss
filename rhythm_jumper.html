<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>节奏跳跃 - Rhythm Jumper</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      background: #0a0a1a;
      overflow: hidden;
      display: flex;
      justify-content: center;
      align-items: center;
      width: 100vw;
      height: 100vh;
      font-family: 'Courier New', monospace;
    }

    canvas {
      display: block;
    }

    #ui-layer {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      pointer-events: none;
    }

    #start-hint {
      position: absolute;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      color: rgba(0, 255, 255, 0.8);
      text-align: center;
      font-family: 'Arial', sans-serif;
      user-select: none;
    }

    #start-hint h1 {
      font-size: 28px;
      font-weight: bold;
      margin-bottom: 8px;
    }

    #start-hint p {
      font-size: 14px;
      color: rgba(0, 255, 255, 0.5);
    }

    #game-over-panel {
      display: none;
      position: absolute;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      background: rgba(10, 10, 26, 0.9);
      border: 2px solid #00ffff;
      border-radius: 12px;
      padding: 32px 48px;
      text-align: center;
      font-family: 'Arial', sans-serif;
      pointer-events: auto;
      user-select: none;
    }

    #game-over-panel h2 {
      color: #ff3355;
      font-size: 36px;
      margin-bottom: 16px;
    }

    #game-over-panel .score {
      color: #ffd700;
      font-size: 24px;
      margin-bottom: 8px;
    }

    #game-over-panel .high-score {
      color: #ffd700;
      font-size: 18px;
      margin-bottom: 24px;
    }

    #game-over-panel button {
      background: transparent;
      color: #00ffff;
      border: 2px solid #00ffff;
      border-radius: 8px;
      padding: 10px 32px;
      font-size: 18px;
      cursor: pointer;
      pointer-events: auto;
      transition: all 0.2s ease;
      font-family: 'Arial', sans-serif;
    }

    #game-over-panel button:hover {
      background: #00ffff;
      color: #0a0a1a;
    }
  </style>
</head>
<body>
  <canvas id="game-canvas"></canvas>

  <div id="ui-layer">
    <div id="start-hint">
      <h1>按 空格键 开始游戏</h1>
      <p>Press SPACE to start</p>
    </div>
    <div id="game-over-panel">
      <h2>游戏结束</h2>
      <div class="score">得分: <span id="final-score">0</span></div>
      <div class="high-score">最高分: <span id="high-score">0</span></div>
      <button id="restart-btn">重新开始</button>
    </div>
  </div>

  <script>
    // Mobile detection
    if (/Mobi|Android|iPhone/i.test(navigator.userAgent) && window.innerWidth < 768) {
      document.addEventListener('DOMContentLoaded', function() {
        var hint = document.getElementById('start-hint');
        if (hint) {
          hint.innerHTML = '<h1>请用电脑打开获得最佳体验</h1><p>Best experienced on desktop</p>';
        }
      });
    }

    // ===== SoundEngine =====
    class SoundEngine {
      constructor() {
        this.ctx = null;
      }

      init() {
        if (this.ctx) return;
        this.ctx = new (window.AudioContext || window.webkitAudioContext)();
      }

      playTone(freq, duration, type, volume) {
        if (!this.ctx) return;
        type = type || 'sine';
        volume = volume || 0.15;
        const osc = this.ctx.createOscillator();
        const gain = this.ctx.createGain();
        osc.type = type;
        osc.frequency.setValueAtTime(freq, this.ctx.currentTime);
        gain.gain.setValueAtTime(volume, this.ctx.currentTime);
        gain.gain.exponentialRampToValueAtTime(0.001, this.ctx.currentTime + duration);
        osc.connect(gain);
        gain.connect(this.ctx.destination);
        osc.start();
        osc.stop(this.ctx.currentTime + duration);
      }

      playJump() {
        this.init();
        this.playTone(800, 0.08);
        setTimeout(() => { if (this.ctx) this.playTone(1000, 0.06); }, 30);
      }

      playDoubleJump() {
        this.init();
        this.playTone(1200, 0.06);
        setTimeout(() => { if (this.ctx) this.playTone(1400, 0.05); }, 20);
      }

      playHit() {
        this.init();
        this.playTone(200, 0.3, 'square', 0.2);
        if (!this.ctx) return;
        const bufferSize = Math.floor(this.ctx.sampleRate * 0.15);
        const buffer = this.ctx.createBuffer(1, bufferSize, this.ctx.sampleRate);
        const data = buffer.getChannelData(0);
        for (let i = 0; i < bufferSize; i++) {
          data[i] = (Math.random() * 2 - 1) * (1 - i / bufferSize);
        }
        const noise = this.ctx.createBufferSource();
        noise.buffer = buffer;
        const noiseGain = this.ctx.createGain();
        noiseGain.gain.setValueAtTime(0.1, this.ctx.currentTime);
        noiseGain.gain.exponentialRampToValueAtTime(0.001, this.ctx.currentTime + 0.15);
        noise.connect(noiseGain);
        noiseGain.connect(this.ctx.destination);
        noise.start();
      }

      playScore() {
        this.init();
        this.playTone(600, 0.1);
        setTimeout(() => { if (this.ctx) this.playTone(900, 0.08); }, 50);
      }
    }

    const sound = new SoundEngine();

    const canvas = document.getElementById('game-canvas');
    const ctx = canvas.getContext('2d');

    let W = 0;
    let H = 0;
    let groundY = 0;

    function resize() {
      W = canvas.width = window.innerWidth;
      H = canvas.height = window.innerHeight;
      groundY = Math.floor(H * 0.85);
      if (player) player.groundY = groundY;
      if (typeof background !== 'undefined' && background) background = new Background(W, H);
    }

    // ===== Game State =====
    const STATE = { IDLE: 'idle', PLAYING: 'playing', GAMEOVER: 'gameover' };
    let gameState = STATE.IDLE;

    // ===== Player =====
    class Player {
      constructor(x, groundY) {
        this.x = x;
        this.y = groundY;
        this.width = 20;
        this.height = 30;
        this.vy = 0;
        this.gravity = 1800;
        this.jumpForce = -620;
        this.doubleJumpForce = -520;
        this.jumpsLeft = 2;
        this.maxJumps = 2;
        this.groundY = groundY;
        this.isOnGround = true;
      }

      jump() {
        if (this.jumpsLeft <= 0) return false;
        const force = this.jumpsLeft === 2 ? this.jumpForce : this.doubleJumpForce;
        this.vy = force;
        this.jumpsLeft--;
        this.isOnGround = false;
        return true;
      }

      update(dt, groundY) {
        this.groundY = groundY;
        this.vy += this.gravity * dt;
        this.y += this.vy * dt;

        if (this.y + this.height >= groundY) {
          this.y = groundY - this.height;
          this.vy = 0;
          this.jumpsLeft = this.maxJumps;
          this.isOnGround = true;
        }
      }

      draw(ctx) {
        ctx.shadowColor = '#00f0ff';
        ctx.shadowBlur = 12;
        ctx.fillStyle = '#fff';
        ctx.fillRect(this.x, this.y, this.width, this.height);

        ctx.shadowBlur = 0;
        ctx.fillStyle = 'rgba(0, 240, 255, 0.5)';
        ctx.fillRect(this.x - 2, this.y + this.height - 4, this.width + 4, 8);
      }

      getBounds() {
        return { x: this.x, y: this.y, w: this.width, h: this.height };
      }
    }

    // ===== Obstacle =====
    class Obstacle {
      constructor(x, groundY) {
        this.x = x;
        this.width = 22;
        const heights = [25, 35, 45];
        this.height = heights[Math.floor(Math.random() * heights.length)];
        this.y = groundY - this.height;
        this.speed = 320;
        this.passed = false;
      }

      update(dt, speedMultiplier) {
        this.x -= this.speed * speedMultiplier * dt;
      }

      draw(ctx) {
        ctx.shadowColor = 'rgba(255, 0, 50, 0.6)';
        ctx.shadowBlur = 14;

        ctx.fillStyle = '#cc2233';
        ctx.beginPath();
        const cx = this.x + this.width / 2;
        ctx.moveTo(cx, this.y);
        ctx.lineTo(this.x + this.width, this.y + this.height);
        ctx.lineTo(this.x, this.y + this.height);
        ctx.closePath();
        ctx.fill();

        ctx.shadowBlur = 0;
        ctx.fillStyle = '#ff4455';
        ctx.beginPath();
        ctx.moveTo(cx, this.y + 4);
        ctx.lineTo(cx + 6, this.y + this.height);
        ctx.lineTo(cx - 6, this.y + this.height);
        ctx.closePath();
        ctx.fill();
      }

      getBounds() {
        return {
          x: this.x + 4,
          y: this.y + 6,
          w: this.width - 8,
          h: this.height - 6
        };
      }

      isOffScreen() {
        return this.x + this.width < 0;
      }
    }

    // ===== Collision Detection =====
    function rectsCollide(a, b) {
      const margin = 2;
      return (
        a.x + margin < b.x + b.w - margin &&
        a.x + a.w - margin > b.x + margin &&
        a.y + margin < b.y + b.h - margin &&
        a.y + a.h - margin > b.y + margin
      );
    }

    // ===== Particle =====
    class Particle {
      constructor(x, y) {
        this.x = x + (Math.random() - 0.5) * 10;
        this.y = y;
        this.vx = (Math.random() - 0.5) * 60;
        this.vy = -(Math.random() * 120 + 40);
        this.life = 0.5 + Math.random() * 0.3;
        this.maxLife = this.life;
        this.size = 2 + Math.random() * 3;
      }

      update(dt) {
        this.x += this.vx * dt;
        this.y += this.vy * dt;
        this.life -= dt;
      }

      draw(ctx) {
        const alpha = this.life / this.maxLife;
        ctx.fillStyle = 'rgba(0, 240, 255, ' + alpha + ')';
        ctx.fillRect(this.x, this.y, this.size, this.size);
      }

      get alive() { return this.life > 0; }
    }

    // ===== Background =====
    class Background {
      constructor(w, h) {
        this.lights = [];
        for (let i = 0; i < 40; i++) {
          this.lights.push({
            x: Math.random() * w,
            y: Math.random() * h * 0.65,
            r: 0.5 + Math.random() * 1.5,
            alpha: 0.2 + Math.random() * 0.4,
            twinkleSpeed: 1 + Math.random() * 3,
            twinkleOffset: Math.random() * Math.PI * 2
          });
        }
        this.gridOffset = 0;
      }

      update(dt, speed) {
        this.gridOffset += speed * 280 * dt;
        this.gridOffset %= 40;
      }

      draw(ctx, w, groundY) {
        const now = performance.now() / 1000;
        for (const light of this.lights) {
          const flicker = 0.7 + 0.3 * Math.sin(now * light.twinkleSpeed + light.twinkleOffset);
          ctx.fillStyle = 'rgba(200, 180, 255, ' + (light.alpha * flicker) + ')';
          ctx.beginPath();
          ctx.arc(light.x, light.y, light.r, 0, Math.PI * 2);
          ctx.fill();
        }

        ctx.strokeStyle = 'rgba(0, 240, 255, 0.2)';
        ctx.lineWidth = 1;
        for (let x = -this.gridOffset; x < w; x += 40) {
          ctx.beginPath();
          ctx.moveTo(x, groundY + 5);
          ctx.lineTo(x + 15, groundY + 5);
          ctx.stroke();
        }
      }
    }

    function endGame() {
      document.getElementById('game-over-panel').style.display = 'block';
      document.getElementById('final-score').textContent = Math.floor(score);

      const prevHigh = parseInt(localStorage.getItem('rhythmJumperHighScore') || '0');
      const currentHigh = Math.max(prevHigh, Math.floor(score));
      localStorage.setItem('rhythmJumperHighScore', currentHigh);
      document.getElementById('high-score').textContent = currentHigh;
    }

    function resetGame() {
      initGame();
      gameState = STATE.IDLE;
      document.getElementById('game-over-panel').style.display = 'none';
      document.getElementById('start-hint').style.display = 'block';
    }

    document.getElementById('restart-btn').addEventListener('click', resetGame);

    // ===== Game Loop =====
    let player;
    let lastTime = 0;
    let obstacles = [];
    let particles = [];
    let background;
    let obstacleTimer = 0;
    let obstacleInterval = 1.8;
    let speedMultiplier = 1;
    let score = 0;

    function initGame() {
      player = new Player(W * 0.2, groundY);
      obstacles = [];
      particles = [];
      obstacleTimer = 0;
      speedMultiplier = 1;
      score = 0;
      background = new Background(W, H);
    }

    function gameLoop(timestamp) {
      requestAnimationFrame(gameLoop);

      if (lastTime === 0) lastTime = timestamp;
      let dt = (timestamp - lastTime) / 1000;
      if (dt > 0.1) dt = 0.016;
      lastTime = timestamp;

      // Update
      if (gameState === STATE.PLAYING) {
        player.update(dt, groundY);
        background.update(dt, speedMultiplier);

        // Obstacle spawning
        obstacleTimer += dt;
        if (obstacleTimer >= obstacleInterval) {
          obstacleTimer = 0;
          obstacles.push(new Obstacle(W + 50, groundY));
          obstacleInterval = 1.4 + Math.random() * 0.8;
        }

        // Obstacle update + collision
        for (let i = obstacles.length - 1; i >= 0; i--) {
          obstacles[i].update(dt, speedMultiplier);

          const playerBounds = player.getBounds();
          const obsBounds = obstacles[i].getBounds();
          if (rectsCollide(playerBounds, obsBounds)) {
            gameState = STATE.GAMEOVER;
            sound.playHit();
            endGame();
            break;
          }

          if (obstacles[i].isOffScreen()) {
            obstacles.splice(i, 1);
          }
        }

        // Scoring
        score += dt * 10;

        // Obstacle passed bonus
        for (const obs of obstacles) {
          if (!obs.passed && obs.x + obs.width < player.x) {
            obs.passed = true;
            score += 50;
            sound.playScore();
          }
        }

        // Difficulty scaling
        speedMultiplier = 1 + Math.floor(score / 100) * 0.15;
        if (speedMultiplier > 3) speedMultiplier = 3;

        if (keys['Space'] || keys['ArrowUp']) {
          if (player.jump()) {
            for (let i = 0; i < 6; i++) {
              particles.push(new Particle(player.x + player.width / 2, player.y + player.height));
            }
            if (player.jumpsLeft === 1) {
              sound.playDoubleJump();
            } else {
              sound.playJump();
            }
          }
          keys['Space'] = false;
          keys['ArrowUp'] = false;
        }
      } else if (gameState === STATE.IDLE) {
        if (keys['Space'] || keys['ArrowUp']) {
          gameState = STATE.PLAYING;
          obstacles = [];
          particles = [];
          document.getElementById('start-hint').style.display = 'none';
          if (player.jump()) {
            for (let i = 0; i < 6; i++) {
              particles.push(new Particle(player.x + player.width / 2, player.y + player.height));
            }
            sound.playJump();
          }
          keys['Space'] = false;
          keys['ArrowUp'] = false;
        }
      } else if (gameState === STATE.GAMEOVER) {
        if (keys['Space'] || keys['ArrowUp']) {
          resetGame();
          keys['Space'] = false;
          keys['ArrowUp'] = false;
        }
      }

      // Particle update
      for (let i = particles.length - 1; i >= 0; i--) {
        particles[i].update(dt);
        if (!particles[i].alive) particles.splice(i, 1);
      }

      // Render
      ctx.clearRect(0, 0, W, H);
      const grad = ctx.createLinearGradient(0, 0, 0, H);
      grad.addColorStop(0, '#0a0a1a');
      grad.addColorStop(1, '#1a0a2e');
      ctx.fillStyle = grad;
      ctx.fillRect(0, 0, W, H);

      background.draw(ctx, W, groundY);

      ctx.fillStyle = '#00f0ff';
      ctx.fillRect(0, groundY, W, 2);

      // Score
      ctx.fillStyle = '#ffd700';
      ctx.font = 'bold 28px "Courier New", monospace';
      ctx.shadowColor = 'rgba(255, 215, 0, 0.6)';
      ctx.shadowBlur = 8;
      ctx.textAlign = 'right';
      ctx.fillText('SCORE: ' + Math.floor(score), W - 30, 50);
      ctx.shadowBlur = 0;
      ctx.textAlign = 'start';

      // Obstacles
      for (const obs of obstacles) {
        obs.draw(ctx);
      }

      player.draw(ctx);

      for (const p of particles) {
        p.draw(ctx);
      }
    }

    // ===== Init =====
    resize();
    initGame();
    requestAnimationFrame(gameLoop);

    window.addEventListener('resize', resize);

    const keys = {};

    window.addEventListener('keydown', function(e) {
      keys[e.code] = true;
      e.preventDefault();
    });

    window.addEventListener('keyup', function(e) {
      keys[e.code] = false;
      e.preventDefault();
    });
  </script>
</body>
</html>
