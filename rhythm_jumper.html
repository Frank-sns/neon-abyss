<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>节奏跳跃 - Rhythm Jumper</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      background: #0a0a1a;
      overflow: hidden;
      display: flex;
      justify-content: center;
      align-items: center;
      width: 100vw;
      height: 100vh;
    }

    canvas {
      display: block;
    }

    #ui-layer {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      pointer-events: none;
    }

    #start-hint {
      position: absolute;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      color: rgba(0, 255, 255, 0.8);
      text-align: center;
      font-family: 'Arial', sans-serif;
      user-select: none;
    }

    #start-hint h1 {
      font-size: 28px;
      font-weight: bold;
      margin-bottom: 8px;
    }

    #start-hint p {
      font-size: 14px;
      color: rgba(0, 255, 255, 0.5);
    }

    #game-over-panel {
      display: none;
      position: absolute;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      background: rgba(10, 10, 26, 0.9);
      border: 2px solid #00ffff;
      border-radius: 12px;
      padding: 32px 48px;
      text-align: center;
      font-family: 'Arial', sans-serif;
      pointer-events: auto;
      user-select: none;
    }

    #game-over-panel h2 {
      color: #ff3355;
      font-size: 36px;
      margin-bottom: 16px;
    }

    #game-over-panel .score {
      color: #ffd700;
      font-size: 24px;
      margin-bottom: 8px;
    }

    #game-over-panel .high-score {
      color: #ffd700;
      font-size: 18px;
      margin-bottom: 24px;
    }

    #game-over-panel button {
      background: transparent;
      color: #00ffff;
      border: 2px solid #00ffff;
      border-radius: 8px;
      padding: 10px 32px;
      font-size: 18px;
      cursor: pointer;
      pointer-events: auto;
      transition: all 0.2s ease;
      font-family: 'Arial', sans-serif;
    }

    #game-over-panel button:hover {
      background: #00ffff;
      color: #0a0a1a;
    }
  </style>
</head>
<body>
  <canvas id="game-canvas"></canvas>

  <div id="ui-layer">
    <div id="start-hint">
      <h1>按 空格键 开始游戏</h1>
      <p>Press SPACE to start</p>
    </div>
    <div id="game-over-panel">
      <h2>游戏结束</h2>
      <div class="score">得分: <span id="final-score">0</span></div>
      <div class="high-score">最高分: <span id="high-score">0</span></div>
      <button id="restart-btn">重新开始</button>
    </div>
  </div>

  <script>
    const canvas = document.getElementById('game-canvas');
    const ctx = canvas.getContext('2d');

    let W = 0;
    let H = 0;
    let groundY = 0;

    function resize() {
      W = canvas.width = window.innerWidth;
      H = canvas.height = window.innerHeight;
      groundY = Math.floor(H * 0.85);
      draw();
    }

    function draw() {
      ctx.fillStyle = '#0a0a1a';
      ctx.fillRect(0, 0, W, H);

      ctx.strokeStyle = '#00ffff';
      ctx.lineWidth = 2;
      ctx.beginPath();
      ctx.moveTo(0, groundY);
      ctx.lineTo(W, groundY);
      ctx.stroke();
    }

    resize();

    window.addEventListener('resize', resize);

    const keys = {};

    window.addEventListener('keydown', function(e) {
      keys[e.code] = true;
      e.preventDefault();
    });

    window.addEventListener('keyup', function(e) {
      keys[e.code] = false;
      e.preventDefault();
    });

    console.log('[Rhythm Jumper] Canvas initialized: ' + W + 'x' + H + ' (groundY=' + groundY + ')');
  </script>
</body>
</html>
