    function gameLoop(timestamp) {
      requestAnimationFrame(gameLoop);

      if (lastTime === 0) lastTime = timestamp;
      let dt = (timestamp - lastTime) / 1000;
      if (dt > 0.1) dt = 0.016;
      lastTime = timestamp;

      // Update
      if (gameState === STATE.PLAYING) {
        player.update(dt, groundY);
        background.update(dt, speedMultiplier);
        music.init();
        music.update(dt, !!boss, boss ? boss.bossType : null);

        // Obstacle spawning
        obstacleTimer += dt;
        if (obstacleTimer >= obstacleInterval) {
          obstacleTimer = 0;
          var obsType = getObstacleType(score);
          obstacles.push(new Obstacle(W + 50, groundY, obsType));
          obstacleInterval = obstacleMinInterval + Math.random() * 0.6;
        }

        // Obstacle update + collision
        for (let i = obstacles.length - 1; i >= 0; i--) {
          obstacles[i].update(dt, speedMultiplier);

          const playerBounds = player.getBounds();
          const obsBounds = obstacles[i].getBounds();
          if (rectsCollide(playerBounds, obsBounds)) {
            var dead = player.takeDamage();
            if (dead) {
              gameState = STATE.GAMEOVER;
              sound.playHit();
              endGame();
              break;
            } else {
              sound.playHit();
              // Destroy obstacle on collision (player smashes through)
              for (var ep = 0; ep < 8; ep++) {
                particles.push(new Particle(obstacles[i].x + obstacles[i].width / 2, obstacles[i].y + obstacles[i].height / 2));
              }
              obstacles.splice(i, 1);
            }
          }

          if (obstacles[i] && obstacles[i].isOffScreen && obstacles[i].isOffScreen()) {
            obstacles.splice(i, 1);
          }
        }

        // Scoring
        score += dt * 10;

        // Obstacle passed bonus
        for (const obs of obstacles) {
          if (!obs.passed && obs.x + obs.width < player.x) {
            obs.passed = true;
            score += 50;
            sound.playScore();
          }
        }

        // Difficulty scaling
        speedMultiplier = 1 + Math.floor(score / 100) * 0.15;
        if (speedMultiplier > 3) speedMultiplier = 3;

        // Dynamic min interval based on score
        if (score < 150) obstacleMinInterval = 1.4;
        else if (score < 350) obstacleMinInterval = 1.2;
        else if (score < 600) obstacleMinInterval = 1.0;
        else if (score < 900) obstacleMinInterval = 0.85;
        else obstacleMinInterval = 0.7;

        // Jump (W)
        if (keys['KeyW']) {
          if (player.jump()) {
            for (let i = 0; i < 6; i++) {
              particles.push(new Particle(player.x + player.width / 2, player.y + player.height));
            }
            if (player.jumpsLeft === 0) {
              sound.playDoubleJump();
            } else {
              sound.playJump();
            }
          }
          keys['KeyW'] = false;
        }

        // Aim: follow mouse cursor
        var dx = mouseX - (player.x + player.width / 2);
        var dy = mouseY - (player.y + player.height / 2);
        player.aimAngle = Math.atan2(-dy, dx) * 180 / Math.PI;

        // Block (Space) — free, no energy cost
        if (keys['Space']) {
          player.blockActive = true;
          player.blockDuration = 0.5;
        }

        // ===== Boss System =====
        if (gameState === STATE.PLAYING) {

        // Player shooting (E key / mouse) — energy-based + aim toward mouse
        playerShootCooldown -= dt;
        if (keys['KeyE'] || mouseDown || clickQueue > 0) {
          if (playerShootCooldown <= 0 && player.energy >= 10) {
            if (clickQueue > 0) clickQueue--;
            playerShootCooldown = 0.18;
            player.energy -= 10;
            var px = player.x + player.width + 8;
            var py = player.y + player.height / 2;
            var mdx = mouseX - px;
            var mdy = mouseY - py;
            var mdist = Math.sqrt(mdx * mdx + mdy * mdy) || 1;
            var lvl = player.powerLevel;
            var baseCount = 1 + (player.buffs.indexOf('wideSpread') !== -1 ? 1 : 0);
            if (lvl <= 0) {
              var pp0 = new PlayerProjectile(px, py);
              pp0.vx = 700 * mdx / mdist;
              pp0.vy = 700 * mdy / mdist;
              playerProjectiles.push(pp0);
            } else {
              var count = lvl === 1 ? (2 + baseCount - 1) : (lvl === 2 ? (3 + baseCount - 1) : (5 + baseCount - 1));
              count = Math.min(count, 7);
              var spread = lvl === 1 ? 4 : (lvl === 2 ? 10 : 14);
              for (var si = 0; si < count; si++) {
                var offset = (si - (count - 1) / 2) * spread;
                var pp = new PlayerProjectile(px, py + offset);
                pp.vx = 700 * mdx / mdist;
                pp.vy = 700 * mdy / mdist;
                if (offset !== 0) {
                  pp.vy += offset * 8;
                }
                playerProjectiles.push(pp);
              }
            }
          }
        }

        // Skill energy regen (same rate as normal)
        player.skillEnergy = Math.min(player.maxSkillEnergy, player.skillEnergy + player.energyRegen * 0.5 * dt);

        // Skill execution (right click)
        if (rightMouseDown && player.skillEnergy >= player.maxSkillEnergy && player.selectedSkill >= 0) {
          rightMouseDown = false;
          player.skillEnergy = 0;
          var skillMsg = SKILLS[player.selectedSkill].execute();
          stageAnnounceText = skillMsg;
          stageAnnounceTimer = 1.2;
          sound.playScore();
        }

        // Skill projectile update
        for (var spi = skillProjectiles.length - 1; spi >= 0; spi--) {
          var skp = skillProjectiles[spi];
          if (skp.isOrbital) {
            skp.orbitalAngle += skp.orbitalSpeed * dt;
            skp.x = player.x + player.width/2 + Math.cos(skp.orbitalAngle) * skp.orbitalDist;
            skp.y = player.y + player.height/2 + Math.sin(skp.orbitalAngle) * skp.orbitalDist;
            skp.orbitalLife -= dt;
            for (var obpi = bossProjectiles.length - 1; obpi >= 0; obpi--) {
              if (rectsCollide(skp.getBounds(), bossProjectiles[obpi].getBounds())) {
                for(var osp=0;osp<4;osp++) particles.push(new Particle(skp.x,skp.y));
                bossProjectiles.splice(obpi, 1); score += 10;
                player.energy = Math.min(player.maxEnergy, player.energy + 125); player.skillEnergy = Math.min(player.maxSkillEnergy, player.skillEnergy + 125);
              }
            }
            if (boss && boss.state==='active' && rectsCollide(skp.getBounds(), boss.getBounds())) {
              boss.takeDamage(); for(var osp2=0;osp2<6;osp2++) particles.push(new Particle(skp.x,skp.y));
            }
            if (skp.orbitalLife <= 0) { for(var osp3=0;osp3<6;osp3++) particles.push(new Particle(skp.x,skp.y)); skillProjectiles.splice(spi,1); }
          } else if (skp.isNovaRing) {
            skp.update(dt);
            if (skp.life2 <= 0) { skillProjectiles.splice(spi,1); continue; }
            var cr = skp.maxR * (1 - skp.life2/0.8), pcx=player.x+player.width/2, pcy=player.y+player.height/2;
            for (var obpi3=bossProjectiles.length-1;obpi3>=0;obpi3--){
              var bpd=Math.sqrt((bossProjectiles[obpi3].x-pcx)*(bossProjectiles[obpi3].x-pcx)+(bossProjectiles[obpi3].y-pcy)*(bossProjectiles[obpi3].y-pcy));
              if(Math.abs(bpd-cr)<25){bossProjectiles.splice(obpi3,1);score+=10;player.energy=Math.min(player.maxEnergy,player.energy+125);player.skillEnergy=Math.min(player.maxSkillEnergy,player.skillEnergy+125);}
            }
            if(boss&&boss.state==='active'){var bd2=Math.sqrt((boss.x-pcx)*(boss.x-pcx)+(boss.y-pcy)*(boss.y-pcy));if(Math.abs(bd2-cr)<30)boss.takeDamage();}
          } else if (skp.update) {
            skp.update(dt, player.x+player.width/2, player.y+player.height/2);
            if (skp.alive===false){skillProjectiles.splice(spi,1);continue;}
            if (boss&&boss.state==='active'&&skp.getBounds&&rectsCollide(skp.getBounds(),boss.getBounds())){
              boss.takeDamage();boss.takeDamage();boss.takeDamage();
              for(var hp=0;hp<12;hp++)particles.push(new Particle(skp.x,skp.y));
              if(!skp.isNova)skp.alive=false;
            }
            if(skp.getBounds)for(var obpi2=bossProjectiles.length-1;obpi2>=0;obpi2--){
              if(rectsCollide(skp.getBounds(),bossProjectiles[obpi2].getBounds())){
                bossProjectiles.splice(obpi2,1);score+=10;
                player.energy=Math.min(player.maxEnergy,player.energy+125);player.skillEnergy=Math.min(player.maxSkillEnergy,player.skillEnergy+125);
                if(!skp.isNova){skp.alive=false;for(var nvp=0;nvp<6;nvp++)particles.push(new Particle(skp.x,skp.y));}
              }
            }
            if(skp.alive===false||skp.x<-80||skp.x>W+80||skp.y<-80||skp.y>H+80)skillProjectiles.splice(spi,1);
          }
        }

        // Screen flash decay
        if (screenFlash > 0) screenFlash -= dt;

        // Laser with charge-up
        if (player.skillActive && player.skillTimer > 0) {
          if (player.skillCharge > 0) {
            player.skillCharge -= dt;
          } else {
            player.skillTimer -= dt;
            var lx1=player.x+player.width,ly1=player.y+player.height/2;
            var aimR=player.aimAngle*Math.PI/180;
            var lx2=lx1+Math.cos(aimR)*W,ly2=ly1-Math.sin(aimR)*W;
            for(var bpiL=bossProjectiles.length-1;bpiL>=0;bpiL--){
              if(distToSegment(bossProjectiles[bpiL].x,bossProjectiles[bpiL].y,lx1,ly1,lx2,ly2)<25){
                bossProjectiles.splice(bpiL,1);score+=10;
                player.energy=Math.min(player.maxEnergy,player.energy+125);player.skillEnergy=Math.min(player.maxSkillEnergy,player.skillEnergy+125);
              }
            }
            if(boss&&boss.state==='active'&&distToSegment(boss.x,boss.y,lx1,ly1,lx2,ly2)<35){boss.takeDamage();boss.takeDamage();}
            player.skillLaser={x1:lx1,y1:ly1,x2:lx2,y2:ly2,charge:false};
          }
          if(player.skillTimer<=0){player.skillActive=false;for(var lep=0;lep<10;lep++)particles.push(new Particle(lx2,ly2));}
        }

        // Share energy gains with skill bar
        // (handled in obstacle/boss proj destruction — add skillEnergy there too)

        // Pickup spawning
        pickupTimer += dt;
        if (pickupTimer >= pickupInterval) {
          pickupTimer = 0;
          pickupInterval = 3 + Math.random() * 5;
          if (Math.random() < 0.6) {
            // Energy orb
            var orbLvl = Math.random() < 0.5 ? 1 : (Math.random() < 0.6 ? 2 : 3);
            pickups.push(new PowerUp(W + 50, groundY, orbLvl));
          } else {
            // Health pack
            pickups.push(new HealthPack(W + 50, groundY));
          }
        }

        // Pickup update
        for (var pui = pickups.length - 1; pui >= 0; pui--) {
          pickups[pui].update(dt, speedMultiplier);
          if (pickups[pui].isOffScreen()) {
            pickups.splice(pui, 1);
          }
        }

        // Pickup collision
        var pb = player.getBounds();
        for (var pci = pickups.length - 1; pci >= 0; pci--) {
          if (rectsCollide(pb, pickups[pci].getBounds())) {
            var item = pickups[pci];
            if (item instanceof PowerUp) {
              player.powerLevel = item.level;
              player.powerTimer = item.level === 1 ? 20 : (item.level === 2 ? 35 : 50);
              sound.playScore();
              // Collect particles
              for (var cp = 0; cp < 5; cp++) {
                particles.push(new Particle(item.x, item.y));
              }
            } else if (item instanceof HealthPack) {
              if (player.hp < player.maxHp) {
                player.hp++;
                sound.playScore();
                for (var hp = 0; hp < 5; hp++) {
                  particles.push(new Particle(item.x, item.y));
                }
              }
            }
            pickups.splice(pci, 1);
          }
        }

        // Energy block spawning (during boss fights)
        if (boss && boss.state === 'active') {
          energyBlockTimer += dt;
          if (energyBlockTimer > 4 + Math.random() * 3 && energyBlocks.length < 3) {
            energyBlockTimer = 0;
            var ebx = 100 + Math.random() * (W - 200);
            var eby = 60 + Math.random() * (groundY - 120);
            energyBlocks.push(new EnergyBlock(ebx, eby));
          }
          // Energy block update
          for (var ebi = energyBlocks.length - 1; ebi >= 0; ebi--) {
            energyBlocks[ebi].update(dt);
          }
        }

        // Player projectile vs energy block
        for (var ppi5 = playerProjectiles.length - 1; ppi5 >= 0; ppi5--) {
          for (var ebi2 = energyBlocks.length - 1; ebi2 >= 0; ebi2--) {
            if (rectsCollide(playerProjectiles[ppi5].getBounds(), energyBlocks[ebi2].getBounds())) {
              playerProjectiles.splice(ppi5, 1);
              if (energyBlocks[ebi2].takeDamage()) {
                player.energy = Math.min(player.maxEnergy, player.energy + 125); player.skillEnergy = Math.min(player.maxSkillEnergy, player.skillEnergy + 125);
                sound.playScore();
                energyBlocks.splice(ebi2, 1);
              }
              break;
            }
          }
        }

        // Energy orbs — auto-absorb (fly to player instantly)
        for (var eoi = energyOrbs.length - 1; eoi >= 0; eoi--) {
          energyOrbs[eoi].update(dt, player.x + player.width/2, player.y + player.height/2);
          if (rectsCollide(player.getBounds(), energyOrbs[eoi].getBounds()) || energyOrbs[eoi].x < player.x + 80) {
            player.energy = Math.min(player.maxEnergy, player.energy + 30); player.skillEnergy = Math.min(player.maxSkillEnergy, player.skillEnergy + 30);
            energyOrbs.splice(eoi, 1);
            sound.playScore();
          }
        }

        // Stage announcement timer
        if (stageAnnounceTimer > 0) stageAnnounceTimer -= dt;
        if (stageClearTimer > 0) stageClearTimer -= dt;
        if (buffMessage && stageClearTimer <= 0) buffMessage = '';

        // Boss spawning
        if (!boss && bossCooldownTimer <= 0 && score >= nextBossScore) {
          bossStage++;
          var bType = getBossTypeForStage(bossStage);
          boss = new Boss(bossStage, bType);
          bossCooldownTimer = 3;
          stageAnnounceText = 'Stage ' + bossStage + ' — ' + boss.config.nameCN + ' 登场!';
          stageAnnounceTimer = 2.5;
          screenFlash = 0.3;
          sound.playBossAppear();
          for (var sep = 0; sep < 30; sep++) particles.push(new Particle(W-120, groundY-220));
        }
        if (bossCooldownTimer > 0 && !boss) {
          bossCooldownTimer -= dt;
        }

        // Boss update
        if (boss) {
          boss.update(dt);

          // Trigger special attack
          if (boss.specialCooldown <= 0 && boss.state === 'active' && boss.config.specials) {
            var spec = boss.triggerSpecial();
            if (spec === 'laserSweep') {
              boss.laserY = 30; boss.laserDir = 1;
            } else if (spec === 'bulletWall') {
              for (var bwx = 0; bwx < 6; bwx++) {
                var bwy = 30 + bwx * (groundY - 60) / 5;
                bossProjectiles.push(new BossProjectile(boss.x - boss.width/2, bwy, -boss.projectileSpeed, 0));
              }
            } else if (spec === 'deployMine') {
              for (var mn = 0; mn < 3; mn++) {
                boss.mines.push(new Mine(boss.x - boss.width/2 - mn*30, boss.y + (mn-1)*40));
              }
            } else if (spec === 'summonDrones') {
              if (boss.drones.length < 4) {
                for (var dn = 0; dn < 2; dn++) {
                  boss.drones.push(new Drone(boss.x - 40, boss.y + (dn-0.5)*60));
                }
              }
            } else if (spec === 'homingOrbs' || spec === 'shieldPulse') {
              // Warden: homing orbs spiral or shield pulse ring
              for (var ho = 0; ho < 12; ho++) {
                var ha = (Math.PI*2/12)*ho;
                var hspd = spec === 'shieldPulse' ? 150 : 200;
                bossProjectiles.push(new BossProjectile(boss.x, boss.y, Math.cos(ha)*hspd, Math.sin(ha)*hspd));
              }
            } else if (spec === 'portalBarrage') {
              // Void Weaver: spawn projectiles from random edges
              for (var pb = 0; pb < 8; pb++) {
                var pSide = Math.floor(Math.random()*3); // 0=top 1=right 2=bottom
                var ppx = pSide===1 ? W : Math.random()*W;
                var ppy = pSide===0 ? 0 : (pSide===2 ? groundY : Math.random()*groundY);
                bossProjectiles.push(new BossProjectile(ppx, ppy, -200+Math.random()*-100, (player.y-ppy)*0.8));
              }
            } else if (spec === 'voidRift') {
              // Void Weaver: create dangerous zone
              boss.voidRiftX = player.x + (Math.random()-0.5)*200;
              boss.voidRiftY = player.y + (Math.random()-0.5)*150;
              boss.voidRiftTimer = 3;
            } else if (spec === 'lightningStrike') {
              // Storm Caller: targeted lightning
              for (var ls = 0; ls < 3; ls++) {
                (function(d){setTimeout(function(){
                  if(!boss||boss.state!=='active')return;
                  var lx = player.x + (Math.random()-0.5)*150;
                  bossProjectiles.push(new BossProjectile(lx, -20, 0, boss.projectileSpeed*1.5));
                },d*300);})(ls);
              }
            } else if (spec === 'electricField') {
              // Storm Caller: electric field around boss
              for (var ef = 0; ef < 16; ef++) {
                var efa = (Math.PI*2/16)*ef;
                bossProjectiles.push(new BossProjectile(boss.x, boss.y, Math.cos(efa)*100, Math.sin(efa)*100));
              }
            } else if (spec === 'stormSurge') {
              // Storm Caller: wave from right
              for (var ss = 0; ss < 10; ss++) {
                bossProjectiles.push(new BossProjectile(W+20, 50+ss*(groundY-100)/9, -boss.projectileSpeed*1.3, 0));
              }
            } else if (spec === 'iceShards') {
              // Frost Titan: aimed ice shards
              for (var is_ = 0; is_ < 5; is_++) {
                var isa = Math.atan2(player.y-boss.y, player.x-boss.x) + (is_-2)*0.3;
                bossProjectiles.push(new BossProjectile(boss.x, boss.y, Math.cos(isa)*boss.projectileSpeed, Math.sin(isa)*boss.projectileSpeed));
              }
            } else if (spec === 'freezeAura') {
              // Frost Titan: slowing aura — reduce player speed temporarily
              boss.freezeAuraTimer = 2;
            } else if (spec === 'blizzard') {
              // Frost Titan: dense slow projectiles from top
              for (var bz = 0; bz < 12; bz++) {
                bossProjectiles.push(new BossProjectile(50+bz*(W-100)/11, -10, 40+Math.random()*30, boss.projectileSpeed*0.8));
              }
            } else if (spec === 'groundSlam') {
              // Berserker: shockwave along ground
              for (var gs = 0; gs < 8; gs++) {
                bossProjectiles.push(new BossProjectile(boss.x-gs*40, groundY-5, -200, -50));
              }
            }
          }

          // Laser sweep animation (Beam Lord)
          if (boss.specialState === 'laserSweep') {
            boss.laserY += boss.laserDir * 250 * dt;
            if (boss.laserY > groundY - 20) { boss.laserY = groundY - 20; boss.laserDir = -1; }
            if (boss.laserY < 30) { boss.laserY = 30; boss.laserDir = 1; boss.specialState = null; }
            // Collision: laser vs player
            var laserRect = { x: 0, y: boss.laserY - 2, w: W, h: 4 };
            if (rectsCollide(player.getBounds(), laserRect)) {
              var lDead = player.takeDamage();
              if (lDead) { gameState = STATE.GAMEOVER; sound.playHit(); endGame(); }
              else sound.playHit();
            }
          }

          // Dash charge (Berserker)
          if (boss.specialState === 'dashCharge') {
            if (boss.specialTimer < 1) {
              // Windup
            } else if (boss.specialTimer < 2) {
              boss.x -= 800 * dt;
              if (boss.x < 100) boss.x = 100;
              if (rectsCollide(player.getBounds(), boss.getBounds())) {
                var dDead = player.takeDamage();
                if (dDead) { gameState = STATE.GAMEOVER; sound.playHit(); endGame(); }
                else { sound.playHit(); player.takeDamage(); } // 2 HP damage
              }
            } else {
              boss.x += 400 * dt;
              if (boss.x >= boss.entryTargetX) { boss.x = boss.entryTargetX; boss.specialState = null; }
            }
          }

          // Chain detonate mines (Mine Deployer)
          if (boss.specialState === 'chainDetonate' && boss.specialTimer > 2) {
            for (var mi2 = boss.mines.length - 1; mi2 >= 0; mi2--) {
              for (var rp = 0; rp < 6; rp++) {
                var ra = (Math.PI * 2 / 6) * rp;
                var rvx = Math.cos(ra) * 120;
                var rvy = Math.sin(ra) * 120;
                bossProjectiles.push(new BossProjectile(boss.mines[mi2].x, boss.mines[mi2].y, rvx, rvy));
              }
              boss.mines.splice(mi2, 1);
            }
            boss.specialState = null;
          }

          // Coordinated barrage (Summoner)
          if (boss.specialState === 'coordinatedBarrage' && boss.specialTimer > 0.5 && boss.specialTimer < 0.55) {
            var bx2 = boss.x - boss.width / 2;
            var by2 = boss.y;
            bossProjectiles.push(new BossProjectile(bx2, by2, -boss.projectileSpeed, 0));
            for (var dbi = 0; dbi < boss.drones.length; dbi++) {
              var dr = boss.drones[dbi];
              bossProjectiles.push(new BossProjectile(dr.x, dr.y, -boss.projectileSpeed * 0.8, (dr.y - player.y) * 0.5));
            }
            boss.specialState = null;
          }

          // Boss firing (basic attack)
          if (boss.shouldFire()) {
            var bx = boss.x - boss.width / 2;
            var by = boss.y;
            var burstCount = boss.enraged ? 3 : (1 + Math.floor(Math.random() * 3));
            for (var bi = 0; bi < burstCount; bi++) {
              (function(delay) {
                setTimeout(function() {
                  if (gameState !== STATE.PLAYING || !boss || boss.state !== 'active') return;
                  var spd = boss.projectileSpeed;
                  var trk = (boss.config && boss.config.tracking) || 0.5;
                  if (boss.bossType === 'berserker') {
                    for (var sg = 0; sg < 9; sg++) {
                      var sga = -Math.PI/4 + (Math.PI/4/8) * sg;
                      bossProjectiles.push(new BossProjectile(bx, by, Math.cos(sga) * -spd, Math.sin(sga) * spd, trk));
                    }
                  } else {
                    var pattern = Math.random() < 0.5 ? 'horizontal' : 'diagonal';
                    var vx = pattern === 'diagonal' ? -spd * 0.87 : -spd;
                    var vy = pattern === 'diagonal' ? -spd * 0.5 : 0;
                    bossProjectiles.push(new BossProjectile(bx, by, vx, vy, trk));
                  }
                }, delay * (boss.enraged ? 80 : 150));
              })(bi);
            }
          }

          // Drone firing (Summoner)
          for (var dri = 0; dri < boss.drones.length; dri++) {
            if (boss.drones[dri].shouldFire()) {
              bossProjectiles.push(new BossProjectile(boss.drones[dri].x, boss.drones[dri].y, -200, 0));
            }
          }

          // Boss defeated — explosion + buff
          if (boss.state === 'defeated') {
            for (var ep = 0; ep < 30; ep++) {
              particles.push(new Particle(boss.x, boss.y));
            }
            score += 300;
            sound.playBossDefeat();
            sound.playExplosion();
            screenFlash = 0.5;
            bossProjectiles = [];
            energyBlocks = [];
            energyOrbs = [];
            // Grant buff
            var buffOrder = ['energyRegen', 'powerShot', 'wideSpread', 'shield'];
            var buffIdx = (bossStage - 1) % buffOrder.length;
            var newBuff = buffOrder[buffIdx];
            if (player.buffs.indexOf(newBuff) === -1) player.buffs.push(newBuff);
            if (newBuff === 'energyRegen') player.energyRegen += 1.5;
            if (newBuff === 'powerShot') player.shotDamage++;
            if (newBuff === 'shield') player.maxHp = Math.min(5, player.maxHp + 1);
            var buffNames = { energyRegen: '能量回复+', powerShot: '威力增强', wideSpread: '弹幕扩散', shield: '护盾+1HP' };
            buffMessage = '获得Buff: ' + buffNames[newBuff] + '!';
            // Grant skill (one per boss, up to 5)
            if (bossStage <= 5 && player.skills.indexOf(bossStage - 1) === -1) {
              player.skills.push(bossStage - 1);
              if (player.selectedSkill === -1) player.selectedSkill = 0;
              buffMessage += ' | 新技能: ' + SKILLS[bossStage-1].name + '!';
            }
            stageClearTimer = 2.5;
            boss = null;
            bossCooldownTimer = 3.5;
            nextBossScore = score + 400 + bossStage * 100;
          }
        }

        // Update boss projectiles
        for (var bpi = bossProjectiles.length - 1; bpi >= 0; bpi--) {
          bossProjectiles[bpi].update(dt, player.x + player.width/2, player.y + player.height/2);
          if (bossProjectiles[bpi].isOffScreen()) {
            bossProjectiles.splice(bpi, 1);
          }
        }

        // Update player projectiles
        for (var ppi = playerProjectiles.length - 1; ppi >= 0; ppi--) {
          playerProjectiles[ppi].update(dt);
          if (playerProjectiles[ppi].isOffScreen()) {
            playerProjectiles.splice(ppi, 1);
          }
        }

        // Collision: player projectile vs boss projectile
        for (var ppi2 = playerProjectiles.length - 1; ppi2 >= 0; ppi2--) {
          var pp = playerProjectiles[ppi2];
          for (var bpi2 = bossProjectiles.length - 1; bpi2 >= 0; bpi2--) {
            var bp = bossProjectiles[bpi2];
            if (rectsCollide(pp.getBounds(), bp.getBounds())) {
              playerProjectiles.splice(ppi2, 1);
              bossProjectiles.splice(bpi2, 1);
              score += 10;
              player.energy = Math.min(player.maxEnergy, player.energy + 125); player.skillEnergy = Math.min(player.maxSkillEnergy, player.skillEnergy + 125);
              sound.playScore();
              break;
            }
          }
        }

        // Collision: player projectile vs obstacle
        for (var ppi4 = playerProjectiles.length - 1; ppi4 >= 0; ppi4--) {
          for (var oi = obstacles.length - 1; oi >= 0; oi--) {
            if (rectsCollide(playerProjectiles[ppi4].getBounds(), obstacles[oi].getBounds())) {
              playerProjectiles.splice(ppi4, 1);
              var obsDead = obstacles[oi].takeDamage();
              if (obsDead) {
                for (var odp = 0; odp < 6; odp++) {
                  particles.push(new Particle(obstacles[oi].x + obstacles[oi].width / 2, obstacles[oi].y + obstacles[oi].height / 2));
                }
                score += 25;
                player.energy = Math.min(player.maxEnergy, player.energy + 125); player.skillEnergy = Math.min(player.maxSkillEnergy, player.skillEnergy + 125);
                obstacles.splice(oi, 1);
              }
              break;
            }
          }
        }

        // Collision: player projectile vs boss
        if (boss && (boss.state === 'active' || boss.state === 'entering')) {
          for (var ppi3 = playerProjectiles.length - 1; ppi3 >= 0; ppi3--) {
            if (rectsCollide(playerProjectiles[ppi3].getBounds(), boss.getBounds())) {
              playerProjectiles.splice(ppi3, 1);
              var defeated = boss.takeDamage();
              if (defeated) {
                // boss.state is now 'defeated', handled above next frame
              }
              break;
            }
          }
        }

        // Collision: boss projectile vs player
        var playerBounds = player.getBounds();
        for (var bpi3 = 0; bpi3 < bossProjectiles.length; bpi3++) {
          if (rectsCollide(playerBounds, bossProjectiles[bpi3].getBounds())) {
            bossProjectiles.splice(bpi3, 1);
            var dead = player.takeDamage();
            if (dead) {
              gameState = STATE.GAMEOVER;
              sound.playHit();
              endGame();
            } else {
              sound.playHit();
            }
            break;
          }
        }
        } // close if (STATE.PLAYING) for boss section
      } else if (gameState === STATE.IDLE) {
        if (keys['KeyW']) {
          gameState = STATE.PLAYING;
          obstacles = [];
          bossProjectiles = [];
          playerProjectiles = [];
          pickups = [];
          particles = [];
          document.getElementById('start-hint').style.display = 'none';
          if (player.jump()) {
            for (let i = 0; i < 6; i++) {
              particles.push(new Particle(player.x + player.width / 2, player.y + player.height));
            }
            sound.playJump();
          }
          keys['KeyW'] = false;
        }
      } else if (gameState === STATE.GAMEOVER) {
        if (keys['KeyW']) {
          resetGame();
          keys['KeyW'] = false;
        }
      }

      // Particle update
      for (let i = particles.length - 1; i >= 0; i--) {
        particles[i].update(dt);
        if (!particles[i].alive) particles.splice(i, 1);
      }

      // Render
      ctx.clearRect(0, 0, W, H);
      const grad = ctx.createLinearGradient(0, 0, 0, H);
      grad.addColorStop(0, '#0a0a1a');
      grad.addColorStop(1, '#1a0a2e');
      ctx.fillStyle = grad;
      ctx.fillRect(0, 0, W, H);

      background.draw(ctx, W, groundY);

      ctx.fillStyle = '#00f0ff';
      ctx.fillRect(0, groundY, W, 2);

      // HP bar
      var hpBarW = 140, hpBarH = 14, hpX = 20, hpY = 22;
      ctx.fillStyle = 'rgba(0,0,0,0.5)';
      ctx.fillRect(hpX - 1, hpY - 1, hpBarW + 2, hpBarH + 2);
      ctx.fillStyle = '#331111';
      ctx.fillRect(hpX, hpY, hpBarW, hpBarH);
      var hpRatio = player.hp / player.maxHp;
      var hpColor = hpRatio > 0.5 ? '#ff3355' : hpRatio > 0.2 ? '#ff8800' : '#ff2222';
      ctx.fillStyle = hpColor;
      ctx.fillRect(hpX, hpY, hpBarW * hpRatio, hpBarH);
      ctx.fillStyle = '#fff';
      ctx.font = 'bold 10px "Courier New", monospace';
      ctx.fillText('HP ' + player.hp + '/' + player.maxHp, hpX + 4, hpY + 11);

      // Energy bar
      var eBarW = 120, eBarH = 12, eBarX = 20, eBarY = 50;
      ctx.fillStyle = 'rgba(0,0,0,0.5)';
      ctx.fillRect(eBarX - 1, eBarY - 1, eBarW + 2, eBarH + 2);
      ctx.fillStyle = '#1a3a3a';
      ctx.fillRect(eBarX, eBarY, eBarW, eBarH);
      var eRatio = player.energy / player.maxEnergy;
      var eColor = eRatio > 0.5 ? '#00ffcc' : eRatio > 0.2 ? '#ffaa00' : '#ff3344';
      ctx.fillStyle = eColor;
      ctx.fillRect(eBarX, eBarY, eBarW * eRatio, eBarH);
      ctx.fillStyle = '#fff';
      ctx.font = '10px "Courier New", monospace';
      ctx.fillText('EN ' + Math.floor(player.energy), eBarX + 4, eBarY + 10);

      // Skill energy bar
      if (player.skills.length > 0) {
        var sBarY = eBarY + 16;
        ctx.fillStyle = 'rgba(0,0,0,0.5)';
        ctx.fillRect(eBarX-1, sBarY-1, eBarW+2, eBarH+2);
        ctx.fillStyle = '#2a1a3a';
        ctx.fillRect(eBarX, sBarY, eBarW, eBarH);
        var sRatio = player.skillEnergy / player.maxSkillEnergy;
        ctx.fillStyle = sRatio >= 1 ? '#ff6644' : '#664466';
        ctx.fillRect(eBarX, sBarY, eBarW * sRatio, eBarH);
        ctx.fillStyle = '#fff';
        ctx.font = '10px "Courier New", monospace';
        var skillName = player.selectedSkill >= 0 ? SKILLS[player.selectedSkill].name : '';
        ctx.fillText('SK ' + skillName + (sRatio>=1?' [就绪]':''), eBarX+4, sBarY+10);
      }

      // Skill selection indicator
      if (player.skills.length > 0) {
        ctx.fillStyle = '#fff';
        ctx.font = '12px "Courier New", monospace';
        for (var ski = 0; ski < player.skills.length; ski++) {
          var sx = eBarX + ski * 28;
          var sy = eBarY + 32;
          ctx.fillStyle = ski === player.selectedSkill ? '#ff6644' : '#444';
          ctx.fillText(SKILLS[player.skills[ski]].icon, sx, sy);
        }
        ctx.fillText('↕滚轮切换 | 右键释放', eBarX, eBarY + 46);
      }

      // Buff indicators
      for (var bfi = 0; bfi < player.buffs.length; bfi++) {
        var buffIcons = { energyRegen: '⚡', powerShot: '💥', wideSpread: '🎯', shield: '🛡️' };
        ctx.font = '14px Arial';
        ctx.fillText(buffIcons[player.buffs[bfi]] || '?', eBarX + eBarW + 10 + bfi * 22, eBarY + 11);
      }

      // Score
      ctx.fillStyle = '#ffd700';
      ctx.font = 'bold 28px "Courier New", monospace';
      ctx.shadowColor = 'rgba(255, 215, 0, 0.6)';
      ctx.shadowBlur = 8;
      ctx.textAlign = 'right';
      ctx.fillText('SCORE: ' + Math.floor(score), W - 30, 50);
      ctx.shadowBlur = 0;

      // Stage counter
      ctx.fillStyle = '#fff';
      ctx.font = 'bold 14px "Courier New", monospace';
      ctx.textAlign = 'right';
      ctx.fillText('STAGE ' + (bossStage + (boss ? 0 : 1)), W - 30, 78);

      // Buff message
      if (stageClearTimer > 0 && buffMessage) {
        var bmAlpha = Math.min(1, stageClearTimer);
        ctx.fillStyle = 'rgba(0, 255, 200, ' + bmAlpha + ')';
        ctx.font = 'bold 20px "Courier New", monospace';
        ctx.textAlign = 'center';
        ctx.fillText(buffMessage, W / 2, H / 2 - 50);
      }

      // Stage announcement
      if (stageAnnounceTimer > 0) {
        var announceAlpha = Math.min(1, stageAnnounceTimer);
        ctx.fillStyle = 'rgba(255, 255, 255, ' + announceAlpha + ')';
        ctx.font = 'bold 22px "Courier New", monospace';
        ctx.textAlign = 'center';
        ctx.fillText(stageAnnounceText, W / 2, 100);
      }

      // Power-up indicator
      if (player.powerLevel > 0) {
        var puColors = ['', '#44ff44', '#4488ff', '#ffd700'];
        ctx.fillStyle = puColors[player.powerLevel];
        ctx.font = 'bold 16px "Courier New", monospace';
        ctx.textAlign = 'right';
        ctx.fillText('PWR Lv' + player.powerLevel + ' ' + player.powerTimer.toFixed(1) + 's', W - 30, 100);
      }

      ctx.textAlign = 'start';

      // Laser sweep rendering
      if (boss && boss.specialState === 'laserSweep') {
        ctx.fillStyle = 'rgba(204, 68, 255, 0.5)';
        ctx.fillRect(0, boss.laserY - 2, W, 4);
        ctx.fillStyle = 'rgba(255, 255, 255, 0.6)';
        ctx.fillRect(0, boss.laserY, W, 1);
      }

      // Void rift (Void Weaver)
      if (boss && boss.voidRiftTimer > 0) {
        boss.voidRiftTimer -= 0.016;
        ctx.fillStyle = 'rgba(136, 68, 204, 0.3)';
        ctx.beginPath(); ctx.arc(boss.voidRiftX, boss.voidRiftY, 50, 0, Math.PI*2); ctx.fill();
        ctx.strokeStyle = '#8844cc'; ctx.lineWidth = 2;
        ctx.beginPath(); ctx.arc(boss.voidRiftX, boss.voidRiftY, 50, 0, Math.PI*2); ctx.stroke();
        // Damage player in rift
        var vr = { x: boss.voidRiftX-50, y: boss.voidRiftY-50, w: 100, h: 100 };
        if (rectsCollide(player.getBounds(), vr)) {
          if (!player.takeDamage()) sound.playHit();
          else { gameState = STATE.GAMEOVER; sound.playHit(); endGame(); }
        }
      }

      // Freeze aura (Frost Titan)
      if (boss && boss.freezeAuraTimer > 0) {
        boss.freezeAuraTimer -= 0.016;
        ctx.fillStyle = 'rgba(136, 221, 255, 0.15)';
        ctx.beginPath(); ctx.arc(boss.x, boss.y, 120, 0, Math.PI*2); ctx.fill();
        // Slow player when in aura
        var dx2 = player.x - boss.x, dy2 = player.y - boss.y;
        if (Math.sqrt(dx2*dx2+dy2*dy2) < 120) {
          player.vy *= 0.96; // dampen movement
          player.energyRegen = Math.max(2, (player.buffs.indexOf('energyRegen')!==-1 ? 8+1.5*(player.buffs.filter(function(b){return b==='energyRegen'}).length) : 8) - 6);
        } else {
          player.energyRegen = player.buffs.indexOf('energyRegen')!==-1 ? 8+1.5*(player.buffs.filter(function(b){return b==='energyRegen'}).length) : 8;
        }
      }

      // Mine and drone rendering
      if (boss) {
        for (var bmi = 0; bmi < boss.mines.length; bmi++) boss.mines[bmi].draw(ctx);
        for (var bdi = 0; bdi < boss.drones.length; bdi++) boss.drones[bdi].draw(ctx);
      }

      // Boss projectiles
      for (const bp of bossProjectiles) {
        bp.draw(ctx);
      }

      // Pickups
      for (const pu of pickups) {
        pu.draw(ctx);
      }

      // Energy blocks & orbs
      for (const eb of energyBlocks) eb.draw(ctx);
      for (const eo of energyOrbs) eo.draw(ctx);

      // Obstacles
      for (const obs of obstacles) {
        obs.draw(ctx);
      }

      // Boss
      if (boss) boss.draw(ctx);

      player.draw(ctx);

      // Block shield visual
      if (player.blockActive) {
        ctx.strokeStyle = 'rgba(0, 255, 255, 0.6)';
        ctx.lineWidth = 3;
        ctx.shadowColor = 'rgba(0, 255, 255, 0.8)';
        ctx.shadowBlur = 20;
        ctx.beginPath();
        ctx.arc(player.x + player.width/2, player.y + player.height/2, 28, 0, Math.PI*2);
        ctx.stroke();
        ctx.shadowBlur = 0;
      }

      // Crosshair at mouse position
      ctx.strokeStyle = 'rgba(255, 255, 100, 0.7)';
      ctx.lineWidth = 1;
      ctx.beginPath(); ctx.arc(mouseX, mouseY, 8, 0, Math.PI*2); ctx.stroke();
      ctx.beginPath(); ctx.moveTo(mouseX-12, mouseY); ctx.lineTo(mouseX+12, mouseY); ctx.stroke();
      ctx.beginPath(); ctx.moveTo(mouseX, mouseY-12); ctx.lineTo(mouseX, mouseY+12); ctx.stroke();

      // Aim line from player to mouse
      var aix = player.x + player.width/2;
      var aiy = player.y + player.height/2;
      ctx.strokeStyle = 'rgba(255, 255, 100, 0.3)';
      ctx.setLineDash([4, 6]);
      ctx.beginPath();
      ctx.moveTo(aix, aiy);
      ctx.lineTo(mouseX, mouseY);
      ctx.stroke();
      ctx.setLineDash([]);

      // Block duration indicator
      if (player.blockDuration > 0) {
        var bdRatio = player.blockDuration / 0.5;
        ctx.fillStyle = 'rgba(0,0,0,0.5)';
        ctx.fillRect(player.x - 5, player.y - 12, player.width + 10, 4);
        ctx.fillStyle = '#00ffcc';
        ctx.fillRect(player.x - 5, player.y - 12, (player.width + 10) * bdRatio, 4);
      }

      // Laser beam (skill)
      if (player.skillActive && player.skillLaser) {
        var l = player.skillLaser;
        if (l.charge || player.skillCharge > 0) {
          // Charging glow at player
          var ca = player.skillCharge > 0 ? (1 - player.skillCharge/0.15) : 1;
          ctx.fillStyle = 'rgba(0,220,255,'+(0.3*ca)+')';
          ctx.beginPath();ctx.arc(l.x1,l.y1,20*ca,0,Math.PI*2);ctx.fill();
        } else {
          // Main beam
          ctx.strokeStyle='rgba(0,220,255,0.85)';ctx.lineWidth=5;
          ctx.shadowColor='rgba(0,220,255,0.95)';ctx.shadowBlur=25;
          ctx.beginPath();ctx.moveTo(l.x1,l.y1);ctx.lineTo(l.x2,l.y2);ctx.stroke();
          ctx.strokeStyle='rgba(200,240,255,0.7)';ctx.lineWidth=2;ctx.shadowBlur=12;
          ctx.beginPath();ctx.moveTo(l.x1,l.y1);ctx.lineTo(l.x2,l.y2);ctx.stroke();
          ctx.strokeStyle='rgba(255,255,255,0.5)';ctx.lineWidth=1;ctx.shadowBlur=6;
          ctx.beginPath();ctx.moveTo(l.x1,l.y1);ctx.lineTo(l.x2,l.y2);ctx.stroke();
          // Hit glow at far end
          ctx.fillStyle='rgba(0,220,255,0.4)';
          ctx.beginPath();ctx.arc(l.x2,l.y2,12,0,Math.PI*2);ctx.fill();
        }
        ctx.shadowBlur=0;
      }

      // Skill projectiles
      for (const skp of skillProjectiles) {
        if (skp.draw) skp.draw(ctx);
      }

      // Player projectiles
      for (const pp of playerProjectiles) {
        pp.draw(ctx);
      }

      for (const p of particles) {
        p.draw(ctx);
      }

      // Screen flash overlay
      if (screenFlash > 0) {
        ctx.fillStyle = 'rgba(255,255,255,' + (screenFlash * 0.6) + ')';
        ctx.fillRect(0, 0, W, H);
      }
    }

    // ===== Init =====
    const keys = {};
    let mouseDown = false;
    let clickQueue = 0;
    let mouseX = 0, mouseY = 0;

    resize();
    initGame();
    requestAnimationFrame(gameLoop);

    window.addEventListener('resize', resize);
    canvas.addEventListener('mousemove', function(e) {
      var rect = canvas.getBoundingClientRect();
      var sx = canvas.width / rect.width;
      var sy = canvas.height / rect.height;
      mouseX = (e.clientX - rect.left) * sx;
      mouseY = (e.clientY - rect.top) * sy;
    });
    canvas.addEventListener('mousedown', function(e) {
      e.preventDefault();
      var rect = canvas.getBoundingClientRect();
      var sx = canvas.width / rect.width;
      var sy = canvas.height / rect.height;
      mouseX = (e.clientX - rect.left) * sx;
      mouseY = (e.clientY - rect.top) * sy;
      mouseDown = true;
      clickQueue++;
    });
    canvas.addEventListener('mouseup', function(e) { if (e.button === 2) rightMouseDown = true; else mouseDown = false; });
    canvas.addEventListener('contextmenu', function(e) { e.preventDefault(); });
    canvas.addEventListener('wheel', function(e) {
      e.preventDefault();
      if (player.skills.length === 0) return;
      var idx = player.selectedSkill;
      if (e.deltaY > 0) idx = (idx + 1) % player.skills.length;
      else idx = (idx - 1 + player.skills.length) % player.skills.length;
      player.selectedSkill = idx;
    }, { passive: false });

    window.addEventListener('keydown', function(e) {
      keys[e.code] = true;
      if (e.code === 'Space' || e.code === 'KeyW' || e.code === 'KeyE' || e.code === 'ArrowUp' || e.code === 'ArrowDown' || e.code === 'ArrowLeft') {
        e.preventDefault();
      }
    });

    window.addEventListener('keyup', function(e) {
      keys[e.code] = false;
      if (e.code === 'Space' || e.code === 'KeyW' || e.code === 'KeyE' || e.code === 'ArrowUp' || e.code === 'ArrowDown' || e.code === 'ArrowLeft') {
        e.preventDefault();
      }
    });
  </script>
