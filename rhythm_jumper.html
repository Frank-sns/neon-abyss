<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>节奏跳跃 - Rhythm Jumper</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      background: #0a0a1a;
      overflow: hidden;
      display: flex;
      justify-content: center;
      align-items: center;
      width: 100vw;
      height: 100vh;
      font-family: 'Courier New', monospace;
    }

    canvas {
      display: block;
      cursor: crosshair;
    }

    #ui-layer {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      pointer-events: none;
    }

    #start-hint {
      position: absolute;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      color: rgba(0, 255, 255, 0.8);
      text-align: center;
      font-family: 'Arial', sans-serif;
      user-select: none;
    }

    #start-hint h1 {
      font-size: 28px;
      font-weight: bold;
      margin-bottom: 8px;
    }

    #start-hint p {
      font-size: 14px;
      color: rgba(0, 255, 255, 0.5);
    }

    #game-over-panel {
      display: none;
      position: absolute;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      background: rgba(10, 10, 26, 0.9);
      border: 2px solid #00ffff;
      border-radius: 12px;
      padding: 32px 48px;
      text-align: center;
      font-family: 'Arial', sans-serif;
      pointer-events: auto;
      user-select: none;
    }

    #game-over-panel h2 {
      color: #ff3355;
      font-size: 36px;
      margin-bottom: 16px;
    }

    #game-over-panel .score {
      color: #ffd700;
      font-size: 24px;
      margin-bottom: 8px;
    }

    #game-over-panel .high-score {
      color: #ffd700;
      font-size: 18px;
      margin-bottom: 24px;
    }

    #game-over-panel button {
      background: transparent;
      color: #00ffff;
      border: 2px solid #00ffff;
      border-radius: 8px;
      padding: 10px 32px;
      font-size: 18px;
      cursor: pointer;
      pointer-events: auto;
      transition: all 0.2s ease;
      font-family: 'Arial', sans-serif;
    }

    #game-over-panel button:hover {
      background: #00ffff;
      color: #0a0a1a;
    }
  </style>
</head>
<body>
  <canvas id="game-canvas"></canvas>

  <div id="ui-layer">
    <div id="start-hint">
      <h1>按 W 键 开始游戏</h1>
      <p>W 跳跃 | 鼠标移动瞄准 + 左键/E 射击 | Space 格挡</p>
      <p>Press W to start | W:Jump Mouse:Aim+Shoot E:Shoot Space:Block</p>
    </div>
    <div id="game-over-panel">
      <h2>游戏结束</h2>
      <div class="score">得分: <span id="final-score">0</span></div>
      <div class="high-score">最高分: <span id="high-score">0</span></div>
      <button id="restart-btn">重新开始</button>
    </div>
  </div>

  <script>
    // Mobile detection
    if (/Mobi|Android|iPhone/i.test(navigator.userAgent) && window.innerWidth < 768) {
      document.addEventListener('DOMContentLoaded', function() {
        var hint = document.getElementById('start-hint');
        if (hint) {
          hint.innerHTML = '<h1>请用电脑打开获得最佳体验</h1><p>Best experienced on desktop</p>';
        }
      });
    }

    // ===== MusicEngine =====
    class MusicEngine {
      constructor() {
        this.ctx = null;
        this.mode = 'ambient'; // ambient, boss
        this.bossType = null;
        this.notes = [];
        this.noteTimer = 0;
        this.beatTimer = 0;
        this.bassTimer = 0;
        this.masterGain = null;
        this.active = false;
      }

      init() {
        if (this.ctx) return;
        this.ctx = new (window.AudioContext || window.webkitAudioContext)();
        this.masterGain = this.ctx.createGain();
        this.masterGain.gain.value = 0.08;
        this.masterGain.connect(this.ctx.destination);
      }

      playNote(freq, duration, type, vol, when) {
        if (!this.ctx) return;
        var osc = this.ctx.createOscillator();
        var gain = this.ctx.createGain();
        osc.type = type || 'sine';
        osc.frequency.value = freq;
        gain.gain.setValueAtTime(0, when || this.ctx.currentTime);
        gain.gain.linearRampToValueAtTime(vol || 0.06, (when || this.ctx.currentTime) + 0.02);
        gain.gain.exponentialRampToValueAtTime(0.001, (when || this.ctx.currentTime) + duration);
        osc.connect(gain);
        gain.connect(this.masterGain);
        osc.start(when || this.ctx.currentTime);
        osc.stop((when || this.ctx.currentTime) + duration + 0.05);
      }

      update(dt, hasBoss, bossTypeName) {
        if (!this.ctx) return;
        if (hasBoss && bossTypeName !== this.bossType) {
          this.bossType = bossTypeName;
          this.mode = 'boss';
          this.noteTimer = 0;
          this.beatTimer = 0;
        } else if (!hasBoss && this.mode === 'boss') {
          this.mode = 'ambient';
          this.bossType = null;
          this.noteTimer = 0;
          this.beatTimer = 0;
        }

        this.noteTimer += dt;
        this.beatTimer += dt;
        this.bassTimer += dt;

        if (this.mode === 'ambient') {
          // Slow ambient drone + sparse arpeggios
          var ambientBPM = 80;
          var beatInterval = 60 / ambientBPM;
          if (this.beatTimer >= beatInterval) { this.beatTimer -= beatInterval; }
          if (this.bassTimer >= 4) { this.bassTimer = 0; this.playNote(65.4, 3.8, 'sine', 0.04, this.ctx.currentTime); } // C2 drone
          if (this.noteTimer >= beatInterval * 0.5) {
            this.noteTimer -= beatInterval * 0.5;
            var notes = [261.6, 311.1, 349.2, 392.0, 466.2, 349.2, 311.1, 293.7];
            var n = notes[Math.floor(Math.random() * notes.length)];
            this.playNote(n, 0.3, 'triangle', 0.025, this.ctx.currentTime);
          }
        } else {
          // Boss music — scale depends on boss type
          var scales = {
            warden: [261.6, 293.7, 311.1, 349.2, 392.0, 415.3, 466.2], // C minor
            beamLord: [293.7, 349.2, 369.9, 392.0, 440.0, 466.2, 523.3], // D minor
            mineDeployer: [329.6, 349.2, 392.0, 415.3, 440.0, 493.9, 523.3], // E phrygian
            summoner: [349.2, 392.0, 415.3, 440.0, 466.2, 523.3, 587.3], // F minor
            berserker: [392.0, 415.3, 466.2, 523.3, 587.3, 622.3, 698.5] // G minor
          };
          var scale = scales[this.bossType] || scales.warden;
          var bossBPMs = { warden: 140, beamLord: 150, mineDeployer: 130, summoner: 145, berserker: 160 };
          var bpm = bossBPMs[this.bossType] || 140;
          var bi = 60 / bpm;
          if (this.bassTimer >= bi * 2) { this.bassTimer = 0; this.playNote(scale[0] * 0.5, bi * 1.8, 'sawtooth', 0.05, this.ctx.currentTime); }
          if (this.noteTimer >= bi * 0.25) {
            this.noteTimer -= bi * 0.25;
            var ni = Math.floor(Math.random() * scale.length);
            this.playNote(scale[ni], 0.15, 'square', 0.03, this.ctx.currentTime);
          }
        }
      }
    }

    // ===== SoundEngine =====
    class SoundEngine {
      constructor() {
        this.ctx = null;
      }

      init() {
        if (this.ctx) return;
        this.ctx = new (window.AudioContext || window.webkitAudioContext)();
      }

      playTone(freq, duration, type, volume) {
        if (!this.ctx) return;
        type = type || 'sine';
        volume = volume || 0.15;
        const osc = this.ctx.createOscillator();
        const gain = this.ctx.createGain();
        osc.type = type;
        osc.frequency.setValueAtTime(freq, this.ctx.currentTime);
        gain.gain.setValueAtTime(volume, this.ctx.currentTime);
        gain.gain.exponentialRampToValueAtTime(0.001, this.ctx.currentTime + duration);
        osc.connect(gain);
        gain.connect(this.ctx.destination);
        osc.start();
        osc.stop(this.ctx.currentTime + duration);
      }

      playJump() {
        this.init();
        this.playTone(800, 0.08);
        setTimeout(() => { if (this.ctx) this.playTone(1000, 0.06); }, 30);
      }

      playDoubleJump() {
        this.init();
        this.playTone(1200, 0.06);
        setTimeout(() => { if (this.ctx) this.playTone(1400, 0.05); }, 20);
      }

      playHit() {
        this.init();
        this.playTone(200, 0.3, 'square', 0.2);
        if (!this.ctx) return;
        const bufferSize = Math.floor(this.ctx.sampleRate * 0.15);
        const buffer = this.ctx.createBuffer(1, bufferSize, this.ctx.sampleRate);
        const data = buffer.getChannelData(0);
        for (let i = 0; i < bufferSize; i++) {
          data[i] = (Math.random() * 2 - 1) * (1 - i / bufferSize);
        }
        const noise = this.ctx.createBufferSource();
        noise.buffer = buffer;
        const noiseGain = this.ctx.createGain();
        noiseGain.gain.setValueAtTime(0.1, this.ctx.currentTime);
        noiseGain.gain.exponentialRampToValueAtTime(0.001, this.ctx.currentTime + 0.15);
        noise.connect(noiseGain);
        noiseGain.connect(this.ctx.destination);
        noise.start();
      }

      playScore() {
        this.init();
        this.playTone(600, 0.1);
        setTimeout(() => { if (this.ctx) this.playTone(900, 0.08); }, 50);
      }
      playBossAppear() {
        this.init();
        this.playTone(80, 0.5, 'sawtooth', 0.15);
        setTimeout(()=>{if(this.ctx)this.playTone(120,0.3,'sawtooth',0.12);},150);
        setTimeout(()=>{if(this.ctx)this.playTone(200,0.2,'square',0.1);},300);
      }
      playBossDefeat() {
        this.init();
        this.playTone(300, 0.15, 'square', 0.12);
        setTimeout(()=>{if(this.ctx)this.playTone(200,0.2,'square',0.1);},100);
        setTimeout(()=>{if(this.ctx)this.playTone(100,0.4,'sawtooth',0.12);},200);
        setTimeout(()=>{if(this.ctx)this.playTone(50,0.6,'sawtooth',0.15);},300);
      }
      playLaser() {
        this.init();
        this.playTone(2000,0.05,'sawtooth',0.06);
        setTimeout(()=>{if(this.ctx)this.playTone(1500,0.08,'sawtooth',0.05);},40);
      }
      playExplosion() {
        this.init();
        if(!this.ctx)return;
        var bs=Math.floor(this.ctx.sampleRate*0.3);
        var buf=this.ctx.createBuffer(1,bs,this.ctx.sampleRate);
        var d=buf.getChannelData(0);
        for(var i=0;i<bs;i++)d[i]=(Math.random()*2-1)*Math.pow(1-i/bs,2);
        var n=this.ctx.createBufferSource();n.buffer=buf;
        var g=this.ctx.createGain();g.gain.setValueAtTime(0.2,this.ctx.currentTime);
        g.gain.exponentialRampToValueAtTime(0.001,this.ctx.currentTime+0.3);
        n.connect(g);g.connect(this.ctx.destination);n.start();
      }
    }

    const sound = new SoundEngine();
    const music = new MusicEngine();

    const canvas = document.getElementById('game-canvas');
    const ctx = canvas.getContext('2d');

    let W = 0;
    let H = 0;
    let groundY = 0;

    function resize() {
      W = canvas.width = window.innerWidth;
      H = canvas.height = window.innerHeight;
      groundY = Math.floor(H * 0.85);
      if (player) player.groundY = groundY;
      if (typeof background !== 'undefined' && background) background = new Background(W, H);
    }

    // ===== Game State =====
    const STATE = { IDLE: 'idle', PLAYING: 'playing', GAMEOVER: 'gameover' };
    let gameState = STATE.IDLE;

    // ===== Player =====
    class Player {
      constructor(x, groundY) {
        this.x = x;
        this.y = groundY;
        this.width = 20;
        this.height = 30;
        this.vy = 0;
        this.gravity = 1800;
        this.jumpForce = -620;
        this.doubleJumpForce = -520;
        this.jumpsLeft = 2;
        this.maxJumps = 2;
        this.groundY = groundY;
        this.isOnGround = true;
        // HP system
        this.hp = 6;
        this.maxHp = 6;
        this.invincibleTimer = 0;
        // Power-up system
        this.powerLevel = 0;
        this.powerTimer = 0;
        // Energy system
        this.energy = 250;
        this.maxEnergy = 250;
        this.energyRegen = 8;
        // Buffs
        this.buffs = [];
        this.shotDamage = 1;
        // Block
        this.blockActive = false;
        this.blockCooldown = 0;
        this.blockDuration = 0;
        // Aim
        this.aimAngle = 0;
        // Skills
        this.skills = [];
        this.selectedSkill = -1;
        this.skillEnergy = 0;
        this.maxSkillEnergy = 100;
        this.skillActive = false;
        this.skillTimer = 0;
        this.skillTargets = [];
      }

      jump() {
        if (this.jumpsLeft <= 0) return false;
        const force = this.jumpsLeft === 2 ? this.jumpForce : this.doubleJumpForce;
        this.vy = force;
        this.jumpsLeft--;
        this.isOnGround = false;
        return true;
      }

      update(dt, groundY) {
        this.groundY = groundY;
        this.vy += this.gravity * dt;
        this.y += this.vy * dt;

        if (this.y + this.height >= groundY) {
          this.y = groundY - this.height;
          this.vy = 0;
          this.jumpsLeft = this.maxJumps;
          this.isOnGround = true;
        }
        if (this.invincibleTimer > 0) this.invincibleTimer -= dt;
        if (this.powerTimer > 0) {
          this.powerTimer -= dt;
          if (this.powerTimer <= 0) this.powerLevel = 0;
        }
        // Energy regen
        this.energy = Math.min(this.maxEnergy, this.energy + this.energyRegen * dt);
        // Block timers
        if (this.blockCooldown > 0) this.blockCooldown -= dt;
        if (this.blockDuration > 0) { this.blockDuration -= dt; if (this.blockDuration <= 0) this.blockActive = false; }
      }

      takeDamage() {
        if (this.invincibleTimer > 0) return false;
        if (this.blockActive) return false; // Block negates damage
        this.hp--;
        this.invincibleTimer = 1.5;
        return this.hp <= 0;
      }

      draw(ctx) {
        // Invincibility flash
        if (this.invincibleTimer > 0 && Math.floor(this.invincibleTimer * 15) % 2 === 0) {
          ctx.globalAlpha = 0.4;
        }

        // Skin colors based on power level
        var skinColors = ['#fff', '#44ff44', '#4488ff', '#ffd700'];
        var skinGlows = ['#00f0ff', '#44ff44', '#4488ff', '#ffd700'];
        var skin = skinColors[this.powerLevel] || '#fff';
        var skinGlow = skinGlows[this.powerLevel] || '#00f0ff';

        // Aura ring for power level
        if (this.powerLevel > 0) {
          var auraAlpha = 0.2 + Math.sin(performance.now()/300) * 0.1;
          ctx.fillStyle = 'rgba(' + (this.powerLevel===1?'68,255,68':this.powerLevel===2?'68,136,255':'255,215,0') + ',' + auraAlpha + ')';
          ctx.beginPath();
          ctx.arc(this.x + this.width/2, this.y + this.height/2, 22 + this.powerLevel*4, 0, Math.PI*2);
          ctx.fill();
        }

        // Buff indicators (small orbiting dots)
        if (this.buffs.length > 0) {
          var t = performance.now() / 800;
          for (var bi = 0; bi < this.buffs.length; bi++) {
            var ba = t + (Math.PI*2/this.buffs.length)*bi;
            var buffColors = { energyRegen: '#00ffcc', powerShot: '#ff6644', wideSpread: '#ffdd00', shield: '#ff88cc' };
            ctx.fillStyle = buffColors[this.buffs[bi]] || '#fff';
            var bpx = this.x + this.width/2 + Math.cos(ba)*18;
            var bpy = this.y + this.height/2 + Math.sin(ba)*18;
            ctx.fillRect(bpx-2, bpy-2, 4, 4);
          }
        }

        // Main body
        ctx.shadowColor = skinGlow;
        ctx.shadowBlur = 12 + this.powerLevel * 4;
        ctx.fillStyle = skin;
        ctx.fillRect(this.x, this.y, this.width, this.height);

        // Inner highlight
        ctx.shadowBlur = 0;
        var innerColor = this.powerLevel === 1 ? 'rgba(68,255,68,0.5)' : (this.powerLevel===2?'rgba(68,136,255,0.5)':(this.powerLevel===3?'rgba(255,215,0,0.5)':'rgba(0,240,255,0.5)'));
        ctx.fillStyle = innerColor;
        ctx.fillRect(this.x - 2, this.y + this.height - 4, this.width + 4, 8);

        if (this.invincibleTimer > 0 && Math.floor(this.invincibleTimer * 15) % 2 === 0) {
          ctx.globalAlpha = 1;
        }
      }

      getBounds() {
        return { x: this.x, y: this.y, w: this.width, h: this.height };
      }
    }

    // ===== Obstacle =====
    class Obstacle {
      constructor(x, groundY, type) {
        this.x = x;
        this.width = 22;
        this.type = type || 'ground';
        this.speed = 320;
        this.passed = false;
        this.hp = 3;
        this.maxHp = 3;
        this.damageFlash = 0;

        if (this.type === 'ground') {
          const heights = [25, 35, 45];
          this.height = heights[Math.floor(Math.random() * heights.length)];
          this.y = groundY - this.height;
        } else if (this.type === 'midair') {
          const heights = [20, 28, 35];
          this.height = heights[Math.floor(Math.random() * heights.length)];
          this.y = groundY - 120 - this.height;
        } else if (this.type === 'highair') {
          const heights = [18, 24, 30];
          this.height = heights[Math.floor(Math.random() * heights.length)];
          this.y = groundY - 195 - this.height;
        }
      }

      takeDamage() {
        this.hp--;
        this.damageFlash = 0.08;
        return this.hp <= 0;
      }

      update(dt, speedMultiplier) {
        this.x -= this.speed * speedMultiplier * dt;
        if (this.damageFlash > 0) this.damageFlash -= dt;
      }

      draw(ctx) {
        const cx = this.x + this.width / 2;

        if (this.type === 'ground') {
          // Red triangle (existing)
          ctx.shadowColor = 'rgba(255, 0, 50, 0.6)';
          ctx.shadowBlur = 14;
          ctx.fillStyle = '#cc2233';
          ctx.beginPath();
          ctx.moveTo(cx, this.y);
          ctx.lineTo(this.x + this.width, this.y + this.height);
          ctx.lineTo(this.x, this.y + this.height);
          ctx.closePath();
          ctx.fill();
          ctx.shadowBlur = 0;
          ctx.fillStyle = '#ff4455';
          ctx.beginPath();
          ctx.moveTo(cx, this.y + 4);
          ctx.lineTo(cx + 6, this.y + this.height);
          ctx.lineTo(cx - 6, this.y + this.height);
          ctx.closePath();
          ctx.fill();
        } else if (this.type === 'midair') {
          // Purple diamond shape
          ctx.shadowColor = 'rgba(176, 64, 224, 0.6)';
          ctx.shadowBlur = 14;
          ctx.fillStyle = '#b040e0';
          ctx.beginPath();
          ctx.moveTo(cx, this.y);
          ctx.lineTo(this.x + this.width, this.y + this.height / 2);
          ctx.lineTo(cx, this.y + this.height);
          ctx.lineTo(this.x, this.y + this.height / 2);
          ctx.closePath();
          ctx.fill();
          ctx.shadowBlur = 0;
          ctx.fillStyle = '#d080f0';
          ctx.beginPath();
          ctx.moveTo(cx, this.y + 4);
          ctx.lineTo(cx + 4, this.y + this.height / 2);
          ctx.lineTo(cx, this.y + this.height - 4);
          ctx.lineTo(cx - 4, this.y + this.height / 2);
          ctx.closePath();
          ctx.fill();
        } else if (this.type === 'highair') {
          // Orange inverted triangle ▼
          ctx.shadowColor = 'rgba(255, 136, 0, 0.6)';
          ctx.shadowBlur = 14;
          ctx.fillStyle = '#ff8800';
          ctx.beginPath();
          ctx.moveTo(cx, this.y + this.height);
          ctx.lineTo(this.x + this.width, this.y);
          ctx.lineTo(this.x, this.y);
          ctx.closePath();
          ctx.fill();
          ctx.shadowBlur = 0;
          ctx.fillStyle = '#ffaa44';
          ctx.beginPath();
          ctx.moveTo(cx, this.y + this.height - 4);
          ctx.lineTo(cx + 5, this.y + 4);
          ctx.lineTo(cx - 5, this.y + 4);
          ctx.closePath();
          ctx.fill();
        }

        // Damage flash
        if (this.damageFlash > 0) {
          ctx.fillStyle = 'rgba(255,255,255,0.5)';
          ctx.fillRect(this.x - 2, this.y - 2, this.width + 4, this.height + 4);
        }

        // HP dots
        var dotW = (this.width - 6) / this.maxHp;
        for (var d = 0; d < this.maxHp; d++) {
          ctx.fillStyle = d < this.hp ? '#00ff44' : '#333';
          ctx.fillRect(this.x + 3 + d * dotW, this.y - 6, dotW - 2, 3);
        }
      }

      getBounds() {
        return {
          x: this.x + 4,
          y: this.y + 6,
          w: this.width - 8,
          h: this.height - 6
        };
      }

      isOffScreen() {
        return this.x + this.width < 0;
      }
    }

    // ===== Math Helpers =====
    function distToSegment(px, py, x1, y1, x2, y2) {
      var dx = x2-x1, dy = y2-y1;
      var len2 = dx*dx+dy*dy;
      if (len2 === 0) return Math.sqrt((px-x1)*(px-x1)+(py-y1)*(py-y1));
      var t = Math.max(0, Math.min(1, ((px-x1)*dx+(py-y1)*dy)/len2));
      return Math.sqrt((px-(x1+t*dx))*(px-(x1+t*dx))+(py-(y1+t*dy))*(py-(y1+t*dy)));
    }

    // ===== Collision Detection =====
    function rectsCollide(a, b) {
      const margin = 2;
      return (
        a.x + margin < b.x + b.w - margin &&
        a.x + a.w - margin > b.x + margin &&
        a.y + margin < b.y + b.h - margin &&
        a.y + a.h - margin > b.y + margin
      );
    }

    // ===== Particle =====
    class Particle {
      constructor(x, y) {
        this.x = x + (Math.random() - 0.5) * 10;
        this.y = y;
        this.vx = (Math.random() - 0.5) * 60;
        this.vy = -(Math.random() * 120 + 40);
        this.life = 0.5 + Math.random() * 0.3;
        this.maxLife = this.life;
        this.size = 2 + Math.random() * 3;
      }

      update(dt) {
        this.x += this.vx * dt;
        this.y += this.vy * dt;
        this.life -= dt;
      }

      draw(ctx) {
        const alpha = this.life / this.maxLife;
        ctx.fillStyle = 'rgba(0, 240, 255, ' + alpha + ')';
        ctx.fillRect(this.x, this.y, this.size, this.size);
      }

      get alive() { return this.life > 0; }
    }

    // ===== Boss Types Config =====
    var BOSS_TYPES = {
      warden: {

    function getBossTypeForStage(stage) {
      if (stage === 1) return 'warden';
      if (stage === 2) return 'beamLord';
      if (stage === 3) return 'mineDeployer';
      if (stage === 4) return 'summoner';
      if (stage === 5) return 'berserker';
      if (stage === 6) return 'voidWeaver';
      if (stage === 7) return 'stormCaller';
      if (stage === 8) return 'frostTitan';
      // Stage 9+: random from all, +50% stats
      var keys = Object.keys(BOSS_TYPES);
      return keys[Math.floor(Math.random() * keys.length)];
    }

    // ===== Mine (for Mine Deployer boss) =====
    class Mine {
      constructor(x, y) {
        this.x = x;
        this.y = y;
        this.width = 14;
        this.height = 14;
        this.speed = 150;
        this.life = 6;
        this.maxLife = 6;
        this.pulse = 0;
        this.warning = false;
      }

      update(dt, speedMultiplier) {
        this.x -= this.speed * speedMultiplier * dt;
        this.life -= dt;
        this.pulse += dt * 3;
        if (this.life < 1.5) this.warning = true;
      }

      draw(ctx) {
        var alpha = this.life / this.maxLife;
        var pulseR = 7 + Math.sin(this.pulse) * 2;
        var color = this.warning ? '#ff4444' : '#ff8800';
        ctx.shadowColor = 'rgba(255,136,0,0.6)';
        ctx.shadowBlur = 10;
        ctx.fillStyle = color;
        ctx.globalAlpha = alpha;
        ctx.beginPath();
        ctx.arc(this.x, this.y, pulseR, 0, Math.PI * 2);
        ctx.fill();
        ctx.fillStyle = '#fff';
        ctx.beginPath();
        ctx.arc(this.x, this.y, 3, 0, Math.PI * 2);
        ctx.fill();
        ctx.globalAlpha = 1;
        ctx.shadowBlur = 0;
      }

      getBounds() { return { x: this.x-7, y: this.y-7, w: 14, h: 14 }; }
      isOffScreen() { return this.x < -20 || this.life <= 0; }
    }

    // ===== Drone (for Summoner boss) =====
    class Drone {
      constructor(x, y) {
        this.x = x;
        this.y = y;
        this.width = 15;
        this.height = 15;
        this.hp = 2;
        this.maxHp = 2;
        this.baseY = y;
        this.phase = Math.random() * Math.PI * 2;
        this.speed = 0.5 + Math.random() * 0.8;
        this.amplitude = 30 + Math.random() * 50;
        this.fireTimer = 0;
        this.fireInterval = 1.5 + Math.random() * 1;
        this.alive = true;
        this.flashTimer = 0;
      }

      update(dt, speedMultiplier) {
        this.phase += this.speed * dt;
        this.y = this.baseY + Math.sin(this.phase) * this.amplitude;
        this.x -= 60 * speedMultiplier * dt;
        this.fireTimer += dt;
        if (this.flashTimer > 0) this.flashTimer -= dt;
      }

      shouldFire() {
        if (this.fireTimer >= this.fireInterval) {
          this.fireTimer = 0;
          return true;
        }
        return false;
      }

      takeDamage() {
        this.hp--;
        this.flashTimer = 0.08;
        return this.hp <= 0;
      }

      draw(ctx) {
        ctx.shadowColor = 'rgba(68,136,255,0.6)';
        ctx.shadowBlur = 8;
        ctx.fillStyle = this.flashTimer > 0 ? '#fff' : '#4488ff';
        var cx = this.x, cy = this.y, s = 8;
        ctx.beginPath();
        ctx.moveTo(cx + s, cy);
        ctx.lineTo(cx - s*0.7, cy - s*0.7);
        ctx.lineTo(cx - s*0.7, cy + s*0.7);
        ctx.closePath();
        ctx.fill();
        ctx.shadowBlur = 0;
        if (this.hp < this.maxHp) {
          ctx.fillStyle = '#333';
          ctx.fillRect(this.x - 7, this.y - 12, 14, 2);
          ctx.fillStyle = '#4488ff';
          ctx.fillRect(this.x - 7, this.y - 12, 14 * (this.hp/this.maxHp), 2);
        }
      }

      getBounds() { return { x: this.x-8, y: this.y-8, w: 16, h: 16 }; }
      isOffScreen() { return this.x < -50 || !this.alive; }
    }

    // ===== Boss =====
    class Boss {
      constructor(stage, bossType) {
        this.stage = stage;
        this.bossType = bossType || 'warden';
        this.config = BOSS_TYPES[this.bossType];
        this.width = 50;
        this.height = 60;
        var hpF = this.config.hpFormula;
        this.maxHP = hpF(stage);
        this.hp = this.maxHP;
        var fi = this.config.fireInterval(stage);
        this.fireIntervalMin = fi[0];
        this.fireIntervalMax = fi[1];
        var ps = this.config.projSpeed;
        this.projectileSpeed = ps(stage);
        this.state = 'entering';
        this.stateTimer = 0;
        this.fireTimer = 0;
        this.nextFireTime = 1.5;
        this.elapsedTime = 0;
        this.angle = 0;
        this.entryTargetX = W - 120;
        this.x = W + 100;
        this.y = groundY - 220;
        this.oscSpeed = this.config.oscSpeed;
        this.flashTimer = 0;
        // Special attack state
        this.specialTimer = 0;
        this.specialCooldown = 0;
        this.specialState = null; // laserSweep, dashCharge, etc.
        this.shieldActive = false;
        this.enraged = false;
        // Boss-specific
        this.laserY = 0;
        this.laserDir = 1;
        this.dashTarget = 0;
        this.dashPhase = '';
        this.mines = [];
        this.drones = [];
      }

      update(dt) {
        this.elapsedTime += dt;
        this.stateTimer += dt;
        this.fireTimer += dt;
        this.specialTimer += dt;
        if (this.specialCooldown > 0) this.specialCooldown -= dt;
        if (this.flashTimer > 0) this.flashTimer -= dt;

        this.entryTargetX = W - 120;

        // Entry animation — unified slide-in (all boss types)
        if (this.state === 'entering') {
          this.x += (this.entryTargetX - this.x) * 4 * dt;
          if (Math.abs(this.x - this.entryTargetX) < 5 || this.stateTimer > 1.5) {
            this.x = this.entryTargetX;
            this.state = 'active';
          }
        } else if (this.state === 'active') {
          // Free movement pattern based on boss type
          var mvSpeed = 80 + this.stage * 10;
          if (this.bossType === 'warden') {
            this.x = this.entryTargetX + Math.sin(this.elapsedTime * 0.4) * 100;
            this.y = groundY - 220 + Math.sin(this.elapsedTime * this.oscSpeed) * 120;
          } else if (this.bossType === 'beamLord') {
            this.x = W/2 + Math.sin(this.elapsedTime * 0.5) * (W/2 - 80);
            this.y = groundY/2 + Math.cos(this.elapsedTime * 0.7) * (groundY/2 - 80);
          } else if (this.bossType === 'mineDeployer') {
            this.x = W/3 + Math.sin(this.elapsedTime * 0.35) * (W/3);
            this.y = 80 + Math.abs(Math.cos(this.elapsedTime * 0.6)) * (groundY - 160);
          } else if (this.bossType === 'summoner') {
            this.x = W - 150 + Math.sin(this.elapsedTime * 0.3) * 80;
            this.y = groundY - 200 + Math.sin(this.elapsedTime * 0.45) * 150;
          } else if (this.bossType === 'berserker') {
            var chaseSpeed = 0.03;
            this.x += (player.x + 150 - this.x) * chaseSpeed;
            this.y += (player.y - this.y) * chaseSpeed * 2;
          }
          this.x = Math.max(70, Math.min(W - 70, this.x));
          this.y = Math.max(50, Math.min(groundY - this.height - 10, this.y));
          // Update mines and drones
          for (var mi = this.mines.length - 1; mi >= 0; mi--) {
            this.mines[mi].update(dt, 1);
            if (this.mines[mi].isOffScreen()) this.mines.splice(mi, 1);
          }
          for (var di = this.drones.length - 1; di >= 0; di--) {
            this.drones[di].update(dt, 1);
            if (this.drones[di].isOffScreen()) this.drones.splice(di, 1);
          }
        }

        this.angle += dt * 2.5;
      }

      // ---- Special Attacks ----

      triggerSpecial() {
        if (this.state !== 'active') return null;
        if (this.specialCooldown > 0) return null;
        var config = this.config;
        if (!config.specials || config.specials.length === 0) return null;
        var attack = config.specials[Math.floor(Math.random() * config.specials.length)];
        this.specialCooldown = 3 + Math.random() * 3;
        this.specialState = attack;
        this.specialTimer = 0;
        return attack;
      }

      shouldFire() {
        if (this.state !== 'active') return false;
        if (this.fireTimer >= this.nextFireTime) {
          this.fireTimer = 0;
          this.nextFireTime = this.fireIntervalMin + Math.random() * (this.fireIntervalMax - this.fireIntervalMin);
          if (this.enraged) this.nextFireTime *= 0.5;
          return true;
        }
        return false;
      }

      takeDamage() {
        if (this.shieldActive) { this.shieldActive = false; return false; }
        this.hp--;
        this.oscSpeed *= 0.85;
        this.flashTimer = 0.1;
        if (this.config.specials && this.config.specials.indexOf('dashCharge') !== -1 && this.hp <= this.maxHP * 0.3 && !this.enraged) {
          this.enraged = true;
        }
        // Warden shield pulse at 50% HP
        if (this.bossType === 'warden' && this.hp === Math.floor(this.maxHP / 2) && this.specialCooldown <= 1) {
          this.specialCooldown = 0.1; // trigger pulse next frame
        }
        if (this.hp <= 0) {
          this.state = 'defeated';
          return true;
        }
        return false;
      }

      getBounds() {
        return { x: this.x - this.width / 2, y: this.y - this.height / 2, w: this.width, h: this.height };
      }

      draw(ctx) {
        if (this.state === 'defeated') return;
        if (this.state === 'cooldown') return;

        var cx = this.x, cy = this.y;
        var alpha = this.state === 'entering' && this.config.entryStyle === 'fade' ? Math.min(1, this.stateTimer / 1.2) : 1;
        var flashOn = this.flashTimer > 0 && Math.floor(this.flashTimer * 30) % 2 === 0;
        var cfg = this.config;

        ctx.save();
        ctx.globalAlpha = alpha;

        // Ring based on shape
        ctx.strokeStyle = flashOn ? '#fff' : cfg.color;
        ctx.lineWidth = 3;
        ctx.shadowColor = cfg.glowColor;
        ctx.shadowBlur = this.enraged ? 30 : 20;
        ctx.beginPath();
        ctx.ellipse(cx, cy, this.width * 0.7, this.height * 0.45, this.angle, 0, Math.PI * 2);
        ctx.stroke();

        // Core body by shape
        ctx.shadowBlur = 15;
        ctx.fillStyle = flashOn ? '#fff' : cfg.color;
        var shape = cfg.shape, r = this.width * 0.45;
        ctx.beginPath();
        if (shape === 'hexagon' || shape === 'star') {
          var sides = shape === 'star' ? 5 : 6;
          for (var i = 0; i < sides; i++) {
            var a = this.angle * 0.7 + (Math.PI * 2 / sides) * i;
            var rr = shape === 'star' && i % 2 === 0 ? r * 0.55 : r;
            var px = cx + Math.cos(a) * rr;
            var py = cy + Math.sin(a) * rr * 0.7;
            if (i === 0) ctx.moveTo(px, py); else ctx.lineTo(px, py);
          }
        } else if (shape === 'diamond') {
          ctx.moveTo(cx, cy - r * 1.1);
          ctx.lineTo(cx + r, cy);
          ctx.lineTo(cx, cy + r * 0.8);
          ctx.lineTo(cx - r, cy);
        } else if (shape === 'square') {
          ctx.rect(cx - r, cy - r * 0.7, r * 2, r * 1.4);
        } else if (shape === 'eye') {
          ctx.ellipse(cx, cy, r - 2, r * 0.75, 0, 0, Math.PI * 2);
        }
        ctx.closePath();
        ctx.fill();

        // Inner eye
        ctx.shadowBlur = 25;
        ctx.shadowColor = 'rgba(255,255,200,0.9)';
        ctx.fillStyle = this.enraged ? '#ff4444' : '#ffdddd';
        ctx.beginPath();
        ctx.arc(cx, cy, this.width * 0.18, 0, Math.PI * 2);
        ctx.fill();

        // Enrage visual
        if (this.enraged) {
          ctx.strokeStyle = '#ff4444';
          ctx.lineWidth = 2;
          ctx.shadowBlur = 40;
          ctx.shadowColor = 'rgba(255,0,0,0.8)';
          ctx.beginPath();
          ctx.ellipse(cx, cy, this.width * 0.9, this.height * 0.6, this.angle * 3, 0, Math.PI * 2);
          ctx.stroke();
        }

        ctx.restore();

        // Boss name label
        ctx.fillStyle = cfg.color;
        ctx.font = 'bold 13px "Courier New", monospace';
        ctx.textAlign = 'center';
        ctx.fillText(cfg.nameCN, cx, cy - this.height / 2 - 25);
        ctx.textAlign = 'start';

        // HP bar
        if (this.state === 'active' || this.state === 'entering') {
          var barW = 50, barH = 5;
          var barX = cx - barW / 2, barY = cy - this.height / 2 - 12;
          ctx.fillStyle = 'rgba(0,0,0,0.6)';
          ctx.fillRect(barX - 1, barY - 1, barW + 2, barH + 2);
          ctx.fillStyle = '#333';
          ctx.fillRect(barX, barY, barW, barH);
          var hpRatio = this.hp / this.maxHP;
          var hpColor = hpRatio > 0.5 ? '#00ff44' : hpRatio > 0.25 ? '#ffaa00' : '#ff2244';
          ctx.fillStyle = hpColor;
          ctx.fillRect(barX, barY, barW * hpRatio, barH);
        }
      }
    }

    // ===== BossProjectile =====
    class BossProjectile {
      constructor(x, y, vx, vy, tracking) {
        this.x = x;
        this.y = y;
        this.vx = vx;
        this.vy = vy;
        this.width = 16;
        this.height = 16;
        this.alive = true;
        this.tracking = (tracking !== undefined) ? tracking : 0.5; // default: moderate homing
        this.lifetime = 0;
      }

      update(dt, px, py) {
        this.lifetime += dt;
        // Homing: gradually steer toward player
        if (this.tracking > 0 && this.lifetime > 0.3 && px !== undefined) {
          var tdx = px - this.x;
          var tdy = py - this.y;
          var td = Math.sqrt(tdx*tdx + tdy*tdy) || 1;
          var baseSpd = Math.sqrt(this.vx*this.vx + this.vy*this.vy) || 300;
          var targetSpd = 250 + this.tracking * 250; // 250-500 based on tracking
          var steer = 0.02 + this.tracking * 0.04; // 0.02-0.06
          this.vx += (tdx/td * targetSpd - this.vx) * steer;
          this.vy += (tdy/td * targetSpd - this.vy) * steer;
          var spd = Math.sqrt(this.vx*this.vx + this.vy*this.vy);
          var maxSpd = 550; if (spd > maxSpd) { this.vx = this.vx/spd*maxSpd; this.vy = this.vy/spd*maxSpd; }
          var minSpd = 150; if (spd < minSpd) { this.vx = this.vx/spd*minSpd; this.vy = this.vy/spd*minSpd; }
        }
        this.x += this.vx * dt;
        this.y += this.vy * dt;
        if (this.x < -50 || this.y > groundY + 50 || this.y < -50) {
          this.alive = false;
        }
      }

      draw(ctx) {
        ctx.shadowColor = 'rgba(255, 50, 50, 0.9)';
        ctx.shadowBlur = 18;
        ctx.fillStyle = '#ff3333';
        ctx.beginPath();
        ctx.arc(this.x, this.y, this.width / 2, 0, Math.PI * 2);
        ctx.fill();
        // Bright core
        ctx.shadowBlur = 8;
        ctx.fillStyle = '#ffcccc';
        ctx.beginPath();
        ctx.arc(this.x, this.y, this.width / 4, 0, Math.PI * 2);
        ctx.fill();
        ctx.shadowBlur = 0;
      }

      getBounds() {
        return {
          x: this.x - this.width / 2,
          y: this.y - this.height / 2,
          w: this.width,
          h: this.height
        };
      }

      isOffScreen() {
        return !this.alive;
      }
    }

    // ===== PlayerProjectile =====
    class PlayerProjectile {
      constructor(x, y) {
        this.x = x;
        this.y = y;
        this.vx = 700;
        this.vy = 0;
        this.width = 6;
        this.height = 12;
        this.alive = true;
        this.trail = [];
      }

      update(dt) {
        this.trail.push({ x: this.x, y: this.y, life: 0.15 });
        if (this.trail.length > 5) this.trail.shift();
        for (const t of this.trail) t.life -= dt;

        this.x += this.vx * dt;
        this.y += this.vy * dt;
        if (this.x > W + 50 || this.x < -50 || this.y < -50 || this.y > H + 50) {
          this.alive = false;
        }
      }

      draw(ctx) {
        // Trail
        for (const t of this.trail) {
          if (t.life <= 0) continue;
          const alpha = t.life / 0.15;
          ctx.fillStyle = 'rgba(0, 240, 255, ' + (alpha * 0.5) + ')';
          ctx.fillRect(t.x - 2, t.y - 1, 6, 2);
        }
        // Main bolt
        ctx.shadowColor = 'rgba(0, 240, 255, 0.9)';
        ctx.shadowBlur = 12;
        ctx.fillStyle = '#00f0ff';
        ctx.fillRect(this.x - 2, this.y - this.height / 2, 6, this.height);
        ctx.shadowBlur = 0;
        ctx.fillStyle = '#fff';
        ctx.fillRect(this.x - 1, this.y - 4, 2, 8);
      }

      getBounds() {
        return {
          x: this.x - 2,
          y: this.y - this.height / 2,
          w: 6,
          h: this.height
        };
      }

      isOffScreen() {
        return !this.alive;
      }
    }

    // ===== PowerUp =====
    class PowerUp {
      constructor(x, groundY, level) {
        this.x = x;
        this.y = groundY - 60 - Math.random() * 80;
        this.level = level || 1;
        this.speed = 320;
        var sizes = [0, 12, 16, 20];
        this.size = sizes[this.level];
        this.width = this.size;
        this.height = this.size;
        this.glowTimer = 0;
      }

      update(dt, speedMultiplier) {
        this.x -= this.speed * speedMultiplier * dt;
        this.glowTimer += dt * 4;
      }

      draw(ctx) {
        var colors = ['', '#44ff44', '#4488ff', '#ffd700'];
        var color = colors[this.level];
        ctx.shadowColor = color;
        ctx.shadowBlur = 14 + Math.sin(this.glowTimer) * 4;

        // Outer ring
        ctx.strokeStyle = color;
        ctx.lineWidth = 2;
        ctx.beginPath();
        ctx.arc(this.x, this.y, this.size / 2 + 2, 0, Math.PI * 2);
        ctx.stroke();

        // Inner orb
        ctx.fillStyle = color;
        ctx.beginPath();
        ctx.arc(this.x, this.y, this.size / 2 - 2, 0, Math.PI * 2);
        ctx.fill();

        // Core glow
        ctx.fillStyle = '#fff';
        ctx.beginPath();
        ctx.arc(this.x, this.y, this.size / 4, 0, Math.PI * 2);
        ctx.fill();

        ctx.shadowBlur = 0;

        // Level indicator
        ctx.fillStyle = '#fff';
        ctx.font = 'bold ' + (this.size * 0.6) + 'px "Courier New", monospace';
        ctx.textAlign = 'center';
        ctx.fillText(this.level, this.x, this.y + this.size * 0.2);
        ctx.textAlign = 'start';
      }

      getBounds() {
        return { x: this.x - this.size / 2, y: this.y - this.size / 2, w: this.size, h: this.size };
      }

      isOffScreen() {
        return this.x + this.size < 0;
      }
    }

    // ===== HealthPack =====
    class HealthPack {
      constructor(x, groundY) {
        this.x = x;
        this.y = groundY - 60 - Math.random() * 60;
        this.width = 18;
        this.height = 18;
        this.speed = 320;
        this.pulse = 0;
      }

      update(dt, speedMultiplier) {
        this.x -= this.speed * speedMultiplier * dt;
        this.pulse += dt * 3;
      }

      draw(ctx) {
        var pulseR = 9 + Math.sin(this.pulse) * 2;
        ctx.shadowColor = 'rgba(68, 255, 68, 0.7)';
        ctx.shadowBlur = 10 + Math.sin(this.pulse) * 3;

        // Green cross
        ctx.fillStyle = '#44ff44';
        var cx = this.x;
        var cy = this.y;
        var s = pulseR * 0.35;
        ctx.fillRect(cx - s, cy - s * 3, s * 2, s * 6);
        ctx.fillRect(cx - s * 3, cy - s, s * 6, s * 2);

        ctx.shadowBlur = 0;
        ctx.fillStyle = '#fff';
        var si = s * 0.4;
        ctx.fillRect(cx - si, cy - si * 3, si * 2, si * 6);
        ctx.fillRect(cx - si * 3, cy - si, si * 6, si * 2);
      }

      getBounds() {
        return { x: this.x - 9, y: this.y - 9, w: 18, h: 18 };
      }

      isOffScreen() {
        return this.x + 18 < 0;
      }
    }

    // ===== EnergyBlock =====
    class EnergyBlock {
      constructor(x, y) {
        this.x = x;
        this.y = y;
        this.width = 20;
        this.height = 20;
        this.hp = 2;
        this.maxHp = 2;
        this.flashTimer = 0;
        this.alive = true;
      }

      update(dt) { if (this.flashTimer > 0) this.flashTimer -= dt; }

      takeDamage() {
        this.hp--;
        this.flashTimer = 0.06;
        return this.hp <= 0;
      }

      draw(ctx) {
        ctx.shadowColor = 'rgba(0, 255, 200, 0.7)';
        ctx.shadowBlur = 8;
        ctx.fillStyle = this.flashTimer > 0 ? '#fff' : '#00ffcc';
        ctx.fillRect(this.x - 10, this.y - 10, 20, 20);
        ctx.shadowBlur = 0;
        ctx.strokeStyle = '#00ffaa';
        ctx.lineWidth = 1.5;
        ctx.strokeRect(this.x - 10, this.y - 10, 20, 20);
        // HP dots
        for (var ed = 0; ed < this.maxHp; ed++) {
          ctx.fillStyle = ed < this.hp ? '#fff' : '#555';
          ctx.fillRect(this.x - 6 + ed * 6, this.y - 14, 4, 3);
        }
      }

      getBounds() { return { x: this.x - 10, y: this.y - 10, w: 20, h: 20 }; }
    }

    // ===== EnergyOrb =====
    class EnergyOrb {
      constructor(x, y) {
        this.x = x;
        this.y = y;
        this.vx = 0;
        this.vy = 0;
        this.size = 10;
        this.alive = true;
        this.glowTimer = 0;
      }

      update(dt, playerX, playerY) {
        this.glowTimer += dt * 4;
        // Magnetic pull toward player
        var dx = playerX - this.x;
        var dy = playerY - this.y;
        var dist = Math.sqrt(dx * dx + dy * dy) || 1;
        if (dist < 200) {
          var pull = 300 / dist;
          this.vx += (dx / dist) * pull * dt;
          this.vy += (dy / dist) * pull * dt;
        }
        // Damping
        this.vx *= 0.95;
        this.vy *= 0.95;
        this.x += this.vx * dt;
        this.y += this.vy * dt;
      }

      draw(ctx) {
        ctx.shadowColor = 'rgba(0, 255, 200, 0.8)';
        ctx.shadowBlur = 10 + Math.sin(this.glowTimer) * 3;
        ctx.fillStyle = '#00ffcc';
        ctx.beginPath();
        ctx.arc(this.x, this.y, this.size / 2, 0, Math.PI * 2);
        ctx.fill();
        ctx.shadowBlur = 0;
        ctx.fillStyle = '#fff';
        ctx.beginPath();
        ctx.arc(this.x, this.y, 3, 0, Math.PI * 2);
        ctx.fill();
      }

      getBounds() { return { x: this.x - 5, y: this.y - 5, w: 10, h: 10 }; }
    }

    // ===== Background =====
    class Background {
      constructor(w, h) {
        this.lights = [];
        for (let i = 0; i < 40; i++) {
          this.lights.push({
            x: Math.random() * w,
            y: Math.random() * h * 0.65,
            r: 0.5 + Math.random() * 1.5,
            alpha: 0.2 + Math.random() * 0.4,
            twinkleSpeed: 1 + Math.random() * 3,
            twinkleOffset: Math.random() * Math.PI * 2
          });
        }
        this.gridOffset = 0;
      }

      update(dt, speed) {
        this.gridOffset += speed * 280 * dt;
        this.gridOffset %= 40;
      }

      draw(ctx, w, groundY) {
        const now = performance.now() / 1000;
        for (const light of this.lights) {
          const flicker = 0.7 + 0.3 * Math.sin(now * light.twinkleSpeed + light.twinkleOffset);
          ctx.fillStyle = 'rgba(200, 180, 255, ' + (light.alpha * flicker) + ')';
          ctx.beginPath();
          ctx.arc(light.x, light.y, light.r, 0, Math.PI * 2);
          ctx.fill();
        }

        ctx.strokeStyle = 'rgba(0, 240, 255, 0.2)';
        ctx.lineWidth = 1;
        for (let x = -this.gridOffset; x < w; x += 40) {
          ctx.beginPath();
          ctx.moveTo(x, groundY + 5);
          ctx.lineTo(x + 15, groundY + 5);
          ctx.stroke();
        }
      }
    }

    // ===== Obstacle Type Selection =====
    function getObstacleType(currentScore) {
      var rand = Math.random();
      if (currentScore < 150) {
        return 'ground';
      } else if (currentScore < 350) {
        return rand < 0.30 ? 'midair' : 'ground';
      } else if (currentScore < 600) {
        if (rand < 0.15) return 'highair';
        if (rand < 0.50) return 'midair';
        return 'ground';
      } else if (currentScore < 900) {
        if (rand < 0.25) return 'highair';
        if (rand < 0.60) return 'midair';
        return 'ground';
      } else {
        if (rand < 0.35) return 'highair';
        if (rand < 0.70) return 'midair';
        return 'ground';
      }
    }
