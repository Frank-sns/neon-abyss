<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>节奏跳跃 - Rhythm Jumper</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      background: #0a0a1a;
      overflow: hidden;
      display: flex;
      justify-content: center;
      align-items: center;
      width: 100vw;
      height: 100vh;
      font-family: 'Courier New', monospace;
    }

    canvas {
      display: block;
    }

    #ui-layer {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      pointer-events: none;
    }

    #start-hint {
      position: absolute;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      color: rgba(0, 255, 255, 0.8);
      text-align: center;
      font-family: 'Arial', sans-serif;
      user-select: none;
    }

    #start-hint h1 {
      font-size: 28px;
      font-weight: bold;
      margin-bottom: 8px;
    }

    #start-hint p {
      font-size: 14px;
      color: rgba(0, 255, 255, 0.5);
    }

    #game-over-panel {
      display: none;
      position: absolute;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      background: rgba(10, 10, 26, 0.9);
      border: 2px solid #00ffff;
      border-radius: 12px;
      padding: 32px 48px;
      text-align: center;
      font-family: 'Arial', sans-serif;
      pointer-events: auto;
      user-select: none;
    }

    #game-over-panel h2 {
      color: #ff3355;
      font-size: 36px;
      margin-bottom: 16px;
    }

    #game-over-panel .score {
      color: #ffd700;
      font-size: 24px;
      margin-bottom: 8px;
    }

    #game-over-panel .high-score {
      color: #ffd700;
      font-size: 18px;
      margin-bottom: 24px;
    }

    #game-over-panel button {
      background: transparent;
      color: #00ffff;
      border: 2px solid #00ffff;
      border-radius: 8px;
      padding: 10px 32px;
      font-size: 18px;
      cursor: pointer;
      pointer-events: auto;
      transition: all 0.2s ease;
      font-family: 'Arial', sans-serif;
    }

    #game-over-panel button:hover {
      background: #00ffff;
      color: #0a0a1a;
    }
  </style>
</head>
<body>
  <canvas id="game-canvas"></canvas>

  <div id="ui-layer">
    <div id="start-hint">
      <h1>按 空格键 开始游戏</h1>
      <p>跳跃: 空格/↑ | 发射: M键</p>
      <p>Press SPACE to start | Jump: SPACE/↑ | Shoot: M</p>
    </div>
    <div id="game-over-panel">
      <h2>游戏结束</h2>
      <div class="score">得分: <span id="final-score">0</span></div>
      <div class="high-score">最高分: <span id="high-score">0</span></div>
      <button id="restart-btn">重新开始</button>
    </div>
  </div>

  <script>
    // Mobile detection
    if (/Mobi|Android|iPhone/i.test(navigator.userAgent) && window.innerWidth < 768) {
      document.addEventListener('DOMContentLoaded', function() {
        var hint = document.getElementById('start-hint');
        if (hint) {
          hint.innerHTML = '<h1>请用电脑打开获得最佳体验</h1><p>Best experienced on desktop</p>';
        }
      });
    }

    // ===== SoundEngine =====
    class SoundEngine {
      constructor() {
        this.ctx = null;
      }

      init() {
        if (this.ctx) return;
        this.ctx = new (window.AudioContext || window.webkitAudioContext)();
      }

      playTone(freq, duration, type, volume) {
        if (!this.ctx) return;
        type = type || 'sine';
        volume = volume || 0.15;
        const osc = this.ctx.createOscillator();
        const gain = this.ctx.createGain();
        osc.type = type;
        osc.frequency.setValueAtTime(freq, this.ctx.currentTime);
        gain.gain.setValueAtTime(volume, this.ctx.currentTime);
        gain.gain.exponentialRampToValueAtTime(0.001, this.ctx.currentTime + duration);
        osc.connect(gain);
        gain.connect(this.ctx.destination);
        osc.start();
        osc.stop(this.ctx.currentTime + duration);
      }

      playJump() {
        this.init();
        this.playTone(800, 0.08);
        setTimeout(() => { if (this.ctx) this.playTone(1000, 0.06); }, 30);
      }

      playDoubleJump() {
        this.init();
        this.playTone(1200, 0.06);
        setTimeout(() => { if (this.ctx) this.playTone(1400, 0.05); }, 20);
      }

      playHit() {
        this.init();
        this.playTone(200, 0.3, 'square', 0.2);
        if (!this.ctx) return;
        const bufferSize = Math.floor(this.ctx.sampleRate * 0.15);
        const buffer = this.ctx.createBuffer(1, bufferSize, this.ctx.sampleRate);
        const data = buffer.getChannelData(0);
        for (let i = 0; i < bufferSize; i++) {
          data[i] = (Math.random() * 2 - 1) * (1 - i / bufferSize);
        }
        const noise = this.ctx.createBufferSource();
        noise.buffer = buffer;
        const noiseGain = this.ctx.createGain();
        noiseGain.gain.setValueAtTime(0.1, this.ctx.currentTime);
        noiseGain.gain.exponentialRampToValueAtTime(0.001, this.ctx.currentTime + 0.15);
        noise.connect(noiseGain);
        noiseGain.connect(this.ctx.destination);
        noise.start();
      }

      playScore() {
        this.init();
        this.playTone(600, 0.1);
        setTimeout(() => { if (this.ctx) this.playTone(900, 0.08); }, 50);
      }
    }

    const sound = new SoundEngine();

    const canvas = document.getElementById('game-canvas');
    const ctx = canvas.getContext('2d');

    let W = 0;
    let H = 0;
    let groundY = 0;

    function resize() {
      W = canvas.width = window.innerWidth;
      H = canvas.height = window.innerHeight;
      groundY = Math.floor(H * 0.85);
      if (player) player.groundY = groundY;
      if (typeof background !== 'undefined' && background) background = new Background(W, H);
    }

    // ===== Game State =====
    const STATE = { IDLE: 'idle', PLAYING: 'playing', GAMEOVER: 'gameover' };
    let gameState = STATE.IDLE;

    // ===== Player =====
    class Player {
      constructor(x, groundY) {
        this.x = x;
        this.y = groundY;
        this.width = 20;
        this.height = 30;
        this.vy = 0;
        this.gravity = 1800;
        this.jumpForce = -620;
        this.doubleJumpForce = -520;
        this.jumpsLeft = 2;
        this.maxJumps = 2;
        this.groundY = groundY;
        this.isOnGround = true;
        // HP system
        this.hp = 3;
        this.maxHp = 3;
        this.invincibleTimer = 0;
        // Power-up system
        this.powerLevel = 0;
        this.powerTimer = 0;
      }

      jump() {
        if (this.jumpsLeft <= 0) return false;
        const force = this.jumpsLeft === 2 ? this.jumpForce : this.doubleJumpForce;
        this.vy = force;
        this.jumpsLeft--;
        this.isOnGround = false;
        return true;
      }

      update(dt, groundY) {
        this.groundY = groundY;
        this.vy += this.gravity * dt;
        this.y += this.vy * dt;

        if (this.y + this.height >= groundY) {
          this.y = groundY - this.height;
          this.vy = 0;
          this.jumpsLeft = this.maxJumps;
          this.isOnGround = true;
        }
        if (this.invincibleTimer > 0) this.invincibleTimer -= dt;
        if (this.powerTimer > 0) {
          this.powerTimer -= dt;
          if (this.powerTimer <= 0) this.powerLevel = 0;
        }
      }

      takeDamage() {
        if (this.invincibleTimer > 0) return false;
        this.hp--;
        this.invincibleTimer = 1.5;
        return this.hp <= 0;
      }

      draw(ctx) {
        // Invincibility flash
        if (this.invincibleTimer > 0 && Math.floor(this.invincibleTimer * 15) % 2 === 0) {
          ctx.globalAlpha = 0.4;
        }

        ctx.shadowColor = '#00f0ff';
        ctx.shadowBlur = 12;
        ctx.fillStyle = '#fff';
        ctx.fillRect(this.x, this.y, this.width, this.height);

        ctx.shadowBlur = 0;
        ctx.fillStyle = 'rgba(0, 240, 255, 0.5)';
        ctx.fillRect(this.x - 2, this.y + this.height - 4, this.width + 4, 8);

        if (this.invincibleTimer > 0 && Math.floor(this.invincibleTimer * 15) % 2 === 0) {
          ctx.globalAlpha = 1;
        }
      }

      getBounds() {
        return { x: this.x, y: this.y, w: this.width, h: this.height };
      }
    }

    // ===== Obstacle =====
    class Obstacle {
      constructor(x, groundY, type) {
        this.x = x;
        this.width = 22;
        this.type = type || 'ground';
        this.speed = 320;
        this.passed = false;
        this.hp = 3;
        this.maxHp = 3;
        this.damageFlash = 0;

        if (this.type === 'ground') {
          const heights = [25, 35, 45];
          this.height = heights[Math.floor(Math.random() * heights.length)];
          this.y = groundY - this.height;
        } else if (this.type === 'midair') {
          const heights = [20, 28, 35];
          this.height = heights[Math.floor(Math.random() * heights.length)];
          this.y = groundY - 120 - this.height;
        } else if (this.type === 'highair') {
          const heights = [18, 24, 30];
          this.height = heights[Math.floor(Math.random() * heights.length)];
          this.y = groundY - 195 - this.height;
        }
      }

      takeDamage() {
        this.hp--;
        this.damageFlash = 0.08;
        return this.hp <= 0;
      }

      update(dt, speedMultiplier) {
        this.x -= this.speed * speedMultiplier * dt;
        if (this.damageFlash > 0) this.damageFlash -= dt;
      }

      draw(ctx) {
        const cx = this.x + this.width / 2;

        if (this.type === 'ground') {
          // Red triangle (existing)
          ctx.shadowColor = 'rgba(255, 0, 50, 0.6)';
          ctx.shadowBlur = 14;
          ctx.fillStyle = '#cc2233';
          ctx.beginPath();
          ctx.moveTo(cx, this.y);
          ctx.lineTo(this.x + this.width, this.y + this.height);
          ctx.lineTo(this.x, this.y + this.height);
          ctx.closePath();
          ctx.fill();
          ctx.shadowBlur = 0;
          ctx.fillStyle = '#ff4455';
          ctx.beginPath();
          ctx.moveTo(cx, this.y + 4);
          ctx.lineTo(cx + 6, this.y + this.height);
          ctx.lineTo(cx - 6, this.y + this.height);
          ctx.closePath();
          ctx.fill();
        } else if (this.type === 'midair') {
          // Purple diamond shape
          ctx.shadowColor = 'rgba(176, 64, 224, 0.6)';
          ctx.shadowBlur = 14;
          ctx.fillStyle = '#b040e0';
          ctx.beginPath();
          ctx.moveTo(cx, this.y);
          ctx.lineTo(this.x + this.width, this.y + this.height / 2);
          ctx.lineTo(cx, this.y + this.height);
          ctx.lineTo(this.x, this.y + this.height / 2);
          ctx.closePath();
          ctx.fill();
          ctx.shadowBlur = 0;
          ctx.fillStyle = '#d080f0';
          ctx.beginPath();
          ctx.moveTo(cx, this.y + 4);
          ctx.lineTo(cx + 4, this.y + this.height / 2);
          ctx.lineTo(cx, this.y + this.height - 4);
          ctx.lineTo(cx - 4, this.y + this.height / 2);
          ctx.closePath();
          ctx.fill();
        } else if (this.type === 'highair') {
          // Orange inverted triangle ▼
          ctx.shadowColor = 'rgba(255, 136, 0, 0.6)';
          ctx.shadowBlur = 14;
          ctx.fillStyle = '#ff8800';
          ctx.beginPath();
          ctx.moveTo(cx, this.y + this.height);
          ctx.lineTo(this.x + this.width, this.y);
          ctx.lineTo(this.x, this.y);
          ctx.closePath();
          ctx.fill();
          ctx.shadowBlur = 0;
          ctx.fillStyle = '#ffaa44';
          ctx.beginPath();
          ctx.moveTo(cx, this.y + this.height - 4);
          ctx.lineTo(cx + 5, this.y + 4);
          ctx.lineTo(cx - 5, this.y + 4);
          ctx.closePath();
          ctx.fill();
        }

        // Damage flash
        if (this.damageFlash > 0) {
          ctx.fillStyle = 'rgba(255,255,255,0.5)';
          ctx.fillRect(this.x - 2, this.y - 2, this.width + 4, this.height + 4);
        }

        // HP dots
        var dotW = (this.width - 6) / this.maxHp;
        for (var d = 0; d < this.maxHp; d++) {
          ctx.fillStyle = d < this.hp ? '#00ff44' : '#333';
          ctx.fillRect(this.x + 3 + d * dotW, this.y - 6, dotW - 2, 3);
        }
      }

      getBounds() {
        return {
          x: this.x + 4,
          y: this.y + 6,
          w: this.width - 8,
          h: this.height - 6
        };
      }

      isOffScreen() {
        return this.x + this.width < 0;
      }
    }

    // ===== Collision Detection =====
    function rectsCollide(a, b) {
      const margin = 2;
      return (
        a.x + margin < b.x + b.w - margin &&
        a.x + a.w - margin > b.x + margin &&
        a.y + margin < b.y + b.h - margin &&
        a.y + a.h - margin > b.y + margin
      );
    }

    // ===== Particle =====
    class Particle {
      constructor(x, y) {
        this.x = x + (Math.random() - 0.5) * 10;
        this.y = y;
        this.vx = (Math.random() - 0.5) * 60;
        this.vy = -(Math.random() * 120 + 40);
        this.life = 0.5 + Math.random() * 0.3;
        this.maxLife = this.life;
        this.size = 2 + Math.random() * 3;
      }

      update(dt) {
        this.x += this.vx * dt;
        this.y += this.vy * dt;
        this.life -= dt;
      }

      draw(ctx) {
        const alpha = this.life / this.maxLife;
        ctx.fillStyle = 'rgba(0, 240, 255, ' + alpha + ')';
        ctx.fillRect(this.x, this.y, this.size, this.size);
      }

      get alive() { return this.life > 0; }
    }

    // ===== Boss Types Config =====
    var BOSS_TYPES = {
      warden: {
        name: 'Warden', nameCN: '守护者',
        color: '#cc1144', glowColor: 'rgba(255,30,80,0.7)',
        projectileColor: '#ff3333',
        shape: 'hexagon',
        hpFormula: function(stage) { return 3 + stage * 2; },
        fireInterval: function(stage) { return [Math.max(0.4, 0.8-(stage-1)*0.1), Math.max(0.8,1.5-(stage-1)*0.2)]; },
        projSpeed: function(stage) { return 250 + (stage-1) * 50; },
        oscSpeed: 1.2,
        entryStyle: 'slide'
      },
      beamLord: {
        name: 'Beam Lord', nameCN: '光束领主',
        color: '#9944ff', glowColor: 'rgba(153,68,255,0.7)',
        projectileColor: '#cc44ff',
        shape: 'diamond',
        hpFormula: function(stage) { return 5 + stage * 2; },
        fireInterval: function(stage) { return [1.0, 2.0]; },
        projSpeed: function(stage) { return 300 + (stage-1) * 50; },
        oscSpeed: 0.6,
        entryStyle: 'fade',
        specials: ['laserSweep', 'bulletWall']
      },
      mineDeployer: {
        name: 'Mine Deployer', nameCN: '雷区部署者',
        color: '#ff8800', glowColor: 'rgba(255,136,0,0.7)',
        projectileColor: '#ff8800',
        shape: 'square',
        hpFormula: function(stage) { return 6 + stage * 2; },
        fireInterval: function(stage) { return [1.5, 2.5]; },
        projSpeed: function(stage) { return 200 + (stage-1) * 40; },
        oscSpeed: 0.8,
        entryStyle: 'rise',
        specials: ['deployMine', 'chainDetonate']
      },
      summoner: {
        name: 'Summoner', nameCN: '召唤师',
        color: '#4488ff', glowColor: 'rgba(68,136,255,0.7)',
        projectileColor: '#4488ff',
        shape: 'eye',
        hpFormula: function(stage) { return 4 + stage * 2; },
        fireInterval: function(stage) { return [1.2, 2.0]; },
        projSpeed: function(stage) { return 280 + (stage-1) * 45; },
        oscSpeed: 0.5,
        entryStyle: 'warp',
        specials: ['summonDrones', 'coordinatedBarrage']
      },
      berserker: {
        name: 'Berserker', nameCN: '狂战士',
        color: '#ffdddd', glowColor: 'rgba(255,255,255,0.7)',
        projectileColor: '#ffffff',
        shape: 'star',
        hpFormula: function(stage) { return 5 + stage * 2; },
        fireInterval: function(stage) { return [0.8, 1.5]; },
        projSpeed: function(stage) { return 350 + (stage-1) * 60; },
        oscSpeed: 1.5,
        entryStyle: 'crash',
        specials: ['dashCharge', 'shotgunBurst']
      }
    };

    function getBossTypeForStage(stage) {
      if (stage === 1) return 'warden';
      if (stage === 2) return 'beamLord';
      if (stage === 3) return 'mineDeployer';
      if (stage === 4) return 'summoner';
      if (stage === 5) return 'berserker';
      // Stage 6+: random from all types
      var keys = Object.keys(BOSS_TYPES);
      return keys[Math.floor(Math.random() * keys.length)];
    }

    // ===== Mine (for Mine Deployer boss) =====
    class Mine {
      constructor(x, y) {
        this.x = x;
        this.y = y;
        this.width = 14;
        this.height = 14;
        this.speed = 150;
        this.life = 6;
        this.maxLife = 6;
        this.pulse = 0;
        this.warning = false;
      }

      update(dt, speedMultiplier) {
        this.x -= this.speed * speedMultiplier * dt;
        this.life -= dt;
        this.pulse += dt * 3;
        if (this.life < 1.5) this.warning = true;
      }

      draw(ctx) {
        var alpha = this.life / this.maxLife;
        var pulseR = 7 + Math.sin(this.pulse) * 2;
        var color = this.warning ? '#ff4444' : '#ff8800';
        ctx.shadowColor = 'rgba(255,136,0,0.6)';
        ctx.shadowBlur = 10;
        ctx.fillStyle = color;
        ctx.globalAlpha = alpha;
        ctx.beginPath();
        ctx.arc(this.x, this.y, pulseR, 0, Math.PI * 2);
        ctx.fill();
        ctx.fillStyle = '#fff';
        ctx.beginPath();
        ctx.arc(this.x, this.y, 3, 0, Math.PI * 2);
        ctx.fill();
        ctx.globalAlpha = 1;
        ctx.shadowBlur = 0;
      }

      getBounds() { return { x: this.x-7, y: this.y-7, w: 14, h: 14 }; }
      isOffScreen() { return this.x < -20 || this.life <= 0; }
    }

    // ===== Drone (for Summoner boss) =====
    class Drone {
      constructor(x, y) {
        this.x = x;
        this.y = y;
        this.width = 15;
        this.height = 15;
        this.hp = 2;
        this.maxHp = 2;
        this.baseY = y;
        this.phase = Math.random() * Math.PI * 2;
        this.speed = 0.5 + Math.random() * 0.8;
        this.amplitude = 30 + Math.random() * 50;
        this.fireTimer = 0;
        this.fireInterval = 1.5 + Math.random() * 1;
        this.alive = true;
        this.flashTimer = 0;
      }

      update(dt, speedMultiplier) {
        this.phase += this.speed * dt;
        this.y = this.baseY + Math.sin(this.phase) * this.amplitude;
        this.x -= 60 * speedMultiplier * dt;
        this.fireTimer += dt;
        if (this.flashTimer > 0) this.flashTimer -= dt;
      }

      shouldFire() {
        if (this.fireTimer >= this.fireInterval) {
          this.fireTimer = 0;
          return true;
        }
        return false;
      }

      takeDamage() {
        this.hp--;
        this.flashTimer = 0.08;
        return this.hp <= 0;
      }

      draw(ctx) {
        ctx.shadowColor = 'rgba(68,136,255,0.6)';
        ctx.shadowBlur = 8;
        ctx.fillStyle = this.flashTimer > 0 ? '#fff' : '#4488ff';
        var cx = this.x, cy = this.y, s = 8;
        ctx.beginPath();
        ctx.moveTo(cx + s, cy);
        ctx.lineTo(cx - s*0.7, cy - s*0.7);
        ctx.lineTo(cx - s*0.7, cy + s*0.7);
        ctx.closePath();
        ctx.fill();
        ctx.shadowBlur = 0;
        if (this.hp < this.maxHp) {
          ctx.fillStyle = '#333';
          ctx.fillRect(this.x - 7, this.y - 12, 14, 2);
          ctx.fillStyle = '#4488ff';
          ctx.fillRect(this.x - 7, this.y - 12, 14 * (this.hp/this.maxHp), 2);
        }
      }

      getBounds() { return { x: this.x-8, y: this.y-8, w: 16, h: 16 }; }
      isOffScreen() { return this.x < -50 || !this.alive; }
    }

    // ===== Boss =====
    class Boss {
      constructor(stage, bossType) {
        this.stage = stage;
        this.bossType = bossType || 'warden';
        this.config = BOSS_TYPES[this.bossType];
        this.width = 50;
        this.height = 60;
        var hpF = this.config.hpFormula;
        this.maxHP = hpF(stage);
        this.hp = this.maxHP;
        var fi = this.config.fireInterval(stage);
        this.fireIntervalMin = fi[0];
        this.fireIntervalMax = fi[1];
        var ps = this.config.projSpeed;
        this.projectileSpeed = ps(stage);
        this.state = 'entering';
        this.stateTimer = 0;
        this.fireTimer = 0;
        this.nextFireTime = 1.5;
        this.elapsedTime = 0;
        this.angle = 0;
        this.entryTargetX = W - 120;
        this.x = W + 100;
        this.y = groundY - 220;
        this.oscSpeed = this.config.oscSpeed;
        this.flashTimer = 0;
        // Special attack state
        this.specialTimer = 0;
        this.specialCooldown = 0;
        this.specialState = null; // laserSweep, dashCharge, etc.
        this.shieldActive = false;
        this.enraged = false;
        // Boss-specific
        this.laserY = 0;
        this.laserDir = 1;
        this.dashTarget = 0;
        this.dashPhase = '';
        this.mines = [];
        this.drones = [];
      }

      update(dt) {
        this.elapsedTime += dt;
        this.stateTimer += dt;
        this.fireTimer += dt;
        this.specialTimer += dt;
        if (this.specialCooldown > 0) this.specialCooldown -= dt;
        if (this.flashTimer > 0) this.flashTimer -= dt;

        this.entryTargetX = W - 120;

        // Entry animations
        if (this.state === 'entering') {
          var es = this.config.entryStyle;
          if (es === 'slide') {
            this.x += (this.entryTargetX - this.x) * 4 * dt;
            if (Math.abs(this.x - this.entryTargetX) < 5) { this.x = this.entryTargetX; this.state = 'active'; }
          } else if (es === 'fade') {
            if (this.stateTimer > 1.2) { this.x = this.entryTargetX; this.state = 'active'; }
            else this.x = this.entryTargetX;
          } else if (es === 'rise') {
            var targetY = groundY - 220;
            this.x += (this.entryTargetX - this.x) * 3 * dt;
            this.y += (targetY - this.y) * 3 * dt;
            if (Math.abs(this.y - targetY) < 10) { this.y = targetY; this.state = 'active'; }
          } else if (es === 'warp') {
            if (this.stateTimer > 0.6) { this.x = this.entryTargetX; this.state = 'active'; }
          } else if (es === 'crash') {
            var ty = groundY - 220;
            this.y += (ty - this.y) * 8 * dt;
            this.x += (this.entryTargetX - this.x) * 6 * dt;
            if (Math.abs(this.y - ty) < 5) { this.y = ty; this.state = 'active'; }
          }
        } else if (this.state === 'active') {
          this.y = groundY - 220 + Math.sin(this.elapsedTime * this.oscSpeed) * 100;
          this.y = Math.max(30, Math.min(groundY - this.height - 10, this.y));
          // Update mines and drones
          for (var mi = this.mines.length - 1; mi >= 0; mi--) {
            this.mines[mi].update(dt, 1);
            if (this.mines[mi].isOffScreen()) this.mines.splice(mi, 1);
          }
          for (var di = this.drones.length - 1; di >= 0; di--) {
            this.drones[di].update(dt, 1);
            if (this.drones[di].isOffScreen()) this.drones.splice(di, 1);
          }
        }

        this.angle += dt * 2.5;
      }

      // ---- Special Attacks ----

      triggerSpecial() {
        if (this.state !== 'active') return null;
        if (this.specialCooldown > 0) return null;
        var config = this.config;
        if (!config.specials || config.specials.length === 0) return null;
        var attack = config.specials[Math.floor(Math.random() * config.specials.length)];
        this.specialCooldown = 3 + Math.random() * 3;
        this.specialState = attack;
        this.specialTimer = 0;
        return attack;
      }

      shouldFire() {
        if (this.state !== 'active') return false;
        if (this.fireTimer >= this.nextFireTime) {
          this.fireTimer = 0;
          this.nextFireTime = this.fireIntervalMin + Math.random() * (this.fireIntervalMax - this.fireIntervalMin);
          if (this.enraged) this.nextFireTime *= 0.5;
          return true;
        }
        return false;
      }

      takeDamage() {
        if (this.shieldActive) { this.shieldActive = false; return false; }
        this.hp--;
        this.oscSpeed *= 0.85;
        this.flashTimer = 0.1;
        if (this.config.specials && this.config.specials.indexOf('dashCharge') !== -1 && this.hp <= this.maxHP * 0.3 && !this.enraged) {
          this.enraged = true;
        }
        // Warden shield pulse at 50% HP
        if (this.bossType === 'warden' && this.hp === Math.floor(this.maxHP / 2) && this.specialCooldown <= 1) {
          this.specialCooldown = 0.1; // trigger pulse next frame
        }
        if (this.hp <= 0) {
          this.state = 'defeated';
          return true;
        }
        return false;
      }

      getBounds() {
        return { x: this.x - this.width / 2, y: this.y - this.height / 2, w: this.width, h: this.height };
      }

      draw(ctx) {
        if (this.state === 'defeated') return;
        if (this.state === 'cooldown') return;

        var cx = this.x, cy = this.y;
        var alpha = this.state === 'entering' && this.config.entryStyle === 'fade' ? Math.min(1, this.stateTimer / 1.2) : 1;
        var flashOn = this.flashTimer > 0 && Math.floor(this.flashTimer * 30) % 2 === 0;
        var cfg = this.config;

        ctx.save();
        ctx.globalAlpha = alpha;

        // Ring based on shape
        ctx.strokeStyle = flashOn ? '#fff' : cfg.color;
        ctx.lineWidth = 3;
        ctx.shadowColor = cfg.glowColor;
        ctx.shadowBlur = this.enraged ? 30 : 20;
        ctx.beginPath();
        ctx.ellipse(cx, cy, this.width * 0.7, this.height * 0.45, this.angle, 0, Math.PI * 2);
        ctx.stroke();

        // Core body by shape
        ctx.shadowBlur = 15;
        ctx.fillStyle = flashOn ? '#fff' : cfg.color;
        var shape = cfg.shape, r = this.width * 0.45;
        ctx.beginPath();
        if (shape === 'hexagon' || shape === 'star') {
          var sides = shape === 'star' ? 5 : 6;
          for (var i = 0; i < sides; i++) {
            var a = this.angle * 0.7 + (Math.PI * 2 / sides) * i;
            var rr = shape === 'star' && i % 2 === 0 ? r * 0.55 : r;
            var px = cx + Math.cos(a) * rr;
            var py = cy + Math.sin(a) * rr * 0.7;
            if (i === 0) ctx.moveTo(px, py); else ctx.lineTo(px, py);
          }
        } else if (shape === 'diamond') {
          ctx.moveTo(cx, cy - r * 1.1);
          ctx.lineTo(cx + r, cy);
          ctx.lineTo(cx, cy + r * 0.8);
          ctx.lineTo(cx - r, cy);
        } else if (shape === 'square') {
          ctx.rect(cx - r, cy - r * 0.7, r * 2, r * 1.4);
        } else if (shape === 'eye') {
          ctx.ellipse(cx, cy, r - 2, r * 0.75, 0, 0, Math.PI * 2);
        }
        ctx.closePath();
        ctx.fill();

        // Inner eye
        ctx.shadowBlur = 25;
        ctx.shadowColor = 'rgba(255,255,200,0.9)';
        ctx.fillStyle = this.enraged ? '#ff4444' : '#ffdddd';
        ctx.beginPath();
        ctx.arc(cx, cy, this.width * 0.18, 0, Math.PI * 2);
        ctx.fill();

        // Enrage visual
        if (this.enraged) {
          ctx.strokeStyle = '#ff4444';
          ctx.lineWidth = 2;
          ctx.shadowBlur = 40;
          ctx.shadowColor = 'rgba(255,0,0,0.8)';
          ctx.beginPath();
          ctx.ellipse(cx, cy, this.width * 0.9, this.height * 0.6, this.angle * 3, 0, Math.PI * 2);
          ctx.stroke();
        }

        ctx.restore();

        // Boss name label
        ctx.fillStyle = cfg.color;
        ctx.font = 'bold 13px "Courier New", monospace';
        ctx.textAlign = 'center';
        ctx.fillText(cfg.nameCN, cx, cy - this.height / 2 - 25);
        ctx.textAlign = 'start';

        // HP bar
        if (this.state === 'active' || this.state === 'entering') {
          var barW = 50, barH = 5;
          var barX = cx - barW / 2, barY = cy - this.height / 2 - 12;
          ctx.fillStyle = 'rgba(0,0,0,0.6)';
          ctx.fillRect(barX - 1, barY - 1, barW + 2, barH + 2);
          ctx.fillStyle = '#333';
          ctx.fillRect(barX, barY, barW, barH);
          var hpRatio = this.hp / this.maxHP;
          var hpColor = hpRatio > 0.5 ? '#00ff44' : hpRatio > 0.25 ? '#ffaa00' : '#ff2244';
          ctx.fillStyle = hpColor;
          ctx.fillRect(barX, barY, barW * hpRatio, barH);
        }
      }
    }

    // ===== BossProjectile =====
    class BossProjectile {
      constructor(x, y, vx, vy) {
        this.x = x;
        this.y = y;
        this.vx = vx;
        this.vy = vy;
        this.width = 8;
        this.height = 8;
        this.alive = true;
      }

      update(dt) {
        this.x += this.vx * dt;
        this.y += this.vy * dt;
        // Destroy if off left edge or hits ground
        if (this.x < -20 || this.y > groundY) {
          this.alive = false;
        }
      }

      draw(ctx) {
        ctx.shadowColor = 'rgba(255, 50, 50, 0.8)';
        ctx.shadowBlur = 10;
        ctx.fillStyle = '#ff3333';
        ctx.beginPath();
        ctx.arc(this.x, this.y, this.width / 2, 0, Math.PI * 2);
        ctx.fill();
        // Bright core
        ctx.shadowBlur = 0;
        ctx.fillStyle = '#ffaaaa';
        ctx.beginPath();
        ctx.arc(this.x, this.y, 2, 0, Math.PI * 2);
        ctx.fill();
      }

      getBounds() {
        return {
          x: this.x - this.width / 2,
          y: this.y - this.height / 2,
          w: this.width,
          h: this.height
        };
      }

      isOffScreen() {
        return !this.alive;
      }
    }

    // ===== PlayerProjectile =====
    class PlayerProjectile {
      constructor(x, y) {
        this.x = x;
        this.y = y;
        this.vx = 700;
        this.vy = 0;
        this.width = 6;
        this.height = 12;
        this.alive = true;
        this.trail = [];
      }

      update(dt) {
        this.trail.push({ x: this.x, y: this.y, life: 0.15 });
        if (this.trail.length > 5) this.trail.shift();
        for (const t of this.trail) t.life -= dt;

        this.x += this.vx * dt;
        if (this.x > W + 50) {
          this.alive = false;
        }
      }

      draw(ctx) {
        // Trail
        for (const t of this.trail) {
          if (t.life <= 0) continue;
          const alpha = t.life / 0.15;
          ctx.fillStyle = 'rgba(0, 240, 255, ' + (alpha * 0.5) + ')';
          ctx.fillRect(t.x - 2, t.y - 1, 6, 2);
        }
        // Main bolt
        ctx.shadowColor = 'rgba(0, 240, 255, 0.9)';
        ctx.shadowBlur = 12;
        ctx.fillStyle = '#00f0ff';
        ctx.fillRect(this.x - 2, this.y - this.height / 2, 6, this.height);
        ctx.shadowBlur = 0;
        ctx.fillStyle = '#fff';
        ctx.fillRect(this.x - 1, this.y - 4, 2, 8);
      }

      getBounds() {
        return {
          x: this.x - 2,
          y: this.y - this.height / 2,
          w: 6,
          h: this.height
        };
      }

      isOffScreen() {
        return !this.alive;
      }
    }

    // ===== PowerUp =====
    class PowerUp {
      constructor(x, groundY, level) {
        this.x = x;
        this.y = groundY - 60 - Math.random() * 80;
        this.level = level || 1;
        this.speed = 320;
        var sizes = [0, 12, 16, 20];
        this.size = sizes[this.level];
        this.width = this.size;
        this.height = this.size;
        this.glowTimer = 0;
      }

      update(dt, speedMultiplier) {
        this.x -= this.speed * speedMultiplier * dt;
        this.glowTimer += dt * 4;
      }

      draw(ctx) {
        var colors = ['', '#44ff44', '#4488ff', '#ffd700'];
        var color = colors[this.level];
        ctx.shadowColor = color;
        ctx.shadowBlur = 14 + Math.sin(this.glowTimer) * 4;

        // Outer ring
        ctx.strokeStyle = color;
        ctx.lineWidth = 2;
        ctx.beginPath();
        ctx.arc(this.x, this.y, this.size / 2 + 2, 0, Math.PI * 2);
        ctx.stroke();

        // Inner orb
        ctx.fillStyle = color;
        ctx.beginPath();
        ctx.arc(this.x, this.y, this.size / 2 - 2, 0, Math.PI * 2);
        ctx.fill();

        // Core glow
        ctx.fillStyle = '#fff';
        ctx.beginPath();
        ctx.arc(this.x, this.y, this.size / 4, 0, Math.PI * 2);
        ctx.fill();

        ctx.shadowBlur = 0;

        // Level indicator
        ctx.fillStyle = '#fff';
        ctx.font = 'bold ' + (this.size * 0.6) + 'px "Courier New", monospace';
        ctx.textAlign = 'center';
        ctx.fillText(this.level, this.x, this.y + this.size * 0.2);
        ctx.textAlign = 'start';
      }

      getBounds() {
        return { x: this.x - this.size / 2, y: this.y - this.size / 2, w: this.size, h: this.size };
      }

      isOffScreen() {
        return this.x + this.size < 0;
      }
    }

    // ===== HealthPack =====
    class HealthPack {
      constructor(x, groundY) {
        this.x = x;
        this.y = groundY - 60 - Math.random() * 60;
        this.width = 18;
        this.height = 18;
        this.speed = 320;
        this.pulse = 0;
      }

      update(dt, speedMultiplier) {
        this.x -= this.speed * speedMultiplier * dt;
        this.pulse += dt * 3;
      }

      draw(ctx) {
        var pulseR = 9 + Math.sin(this.pulse) * 2;
        ctx.shadowColor = 'rgba(68, 255, 68, 0.7)';
        ctx.shadowBlur = 10 + Math.sin(this.pulse) * 3;

        // Green cross
        ctx.fillStyle = '#44ff44';
        var cx = this.x;
        var cy = this.y;
        var s = pulseR * 0.35;
        ctx.fillRect(cx - s, cy - s * 3, s * 2, s * 6);
        ctx.fillRect(cx - s * 3, cy - s, s * 6, s * 2);

        ctx.shadowBlur = 0;
        ctx.fillStyle = '#fff';
        var si = s * 0.4;
        ctx.fillRect(cx - si, cy - si * 3, si * 2, si * 6);
        ctx.fillRect(cx - si * 3, cy - si, si * 6, si * 2);
      }

      getBounds() {
        return { x: this.x - 9, y: this.y - 9, w: 18, h: 18 };
      }

      isOffScreen() {
        return this.x + 18 < 0;
      }
    }

    // ===== Background =====
    class Background {
      constructor(w, h) {
        this.lights = [];
        for (let i = 0; i < 40; i++) {
          this.lights.push({
            x: Math.random() * w,
            y: Math.random() * h * 0.65,
            r: 0.5 + Math.random() * 1.5,
            alpha: 0.2 + Math.random() * 0.4,
            twinkleSpeed: 1 + Math.random() * 3,
            twinkleOffset: Math.random() * Math.PI * 2
          });
        }
        this.gridOffset = 0;
      }

      update(dt, speed) {
        this.gridOffset += speed * 280 * dt;
        this.gridOffset %= 40;
      }

      draw(ctx, w, groundY) {
        const now = performance.now() / 1000;
        for (const light of this.lights) {
          const flicker = 0.7 + 0.3 * Math.sin(now * light.twinkleSpeed + light.twinkleOffset);
          ctx.fillStyle = 'rgba(200, 180, 255, ' + (light.alpha * flicker) + ')';
          ctx.beginPath();
          ctx.arc(light.x, light.y, light.r, 0, Math.PI * 2);
          ctx.fill();
        }

        ctx.strokeStyle = 'rgba(0, 240, 255, 0.2)';
        ctx.lineWidth = 1;
        for (let x = -this.gridOffset; x < w; x += 40) {
          ctx.beginPath();
          ctx.moveTo(x, groundY + 5);
          ctx.lineTo(x + 15, groundY + 5);
          ctx.stroke();
        }
      }
    }

    function endGame() {
      document.getElementById('game-over-panel').style.display = 'block';
      document.getElementById('final-score').textContent = Math.floor(score);

      const prevHigh = parseInt(localStorage.getItem('rhythmJumperHighScore') || '0');
      const currentHigh = Math.max(prevHigh, Math.floor(score));
      localStorage.setItem('rhythmJumperHighScore', currentHigh);
      document.getElementById('high-score').textContent = currentHigh;
    }

    function resetGame() {
      initGame();
      gameState = STATE.IDLE;
      document.getElementById('game-over-panel').style.display = 'none';
      document.getElementById('start-hint').style.display = 'block';
    }

    document.getElementById('restart-btn').addEventListener('click', resetGame);

    // ===== Game Loop =====
    let player;
    let lastTime = 0;
    let obstacles = [];
    let particles = [];
    let background;
    let obstacleTimer = 0;
    let obstacleInterval = 1.8;
    let obstacleMinInterval = 1.4;
    let speedMultiplier = 1;
    let score = 0;

    // Boss state
    let boss = null;
    let bossProjectiles = [];
    let playerProjectiles = [];
    let bossStage = 0;
    let nextBossScore = 300;
    let bossCooldownTimer = 0;
    let playerShootCooldown = 0;
    let stageAnnounceText = '';
    let stageAnnounceTimer = 0;

    // Pickup state
    let pickups = [];
    let pickupTimer = 0;
    let pickupInterval = 5;

    // ===== Obstacle Type Selection =====
    function getObstacleType(currentScore) {
      var rand = Math.random();
      if (currentScore < 150) {
        return 'ground';
      } else if (currentScore < 350) {
        return rand < 0.30 ? 'midair' : 'ground';
      } else if (currentScore < 600) {
        if (rand < 0.15) return 'highair';
        if (rand < 0.50) return 'midair';
        return 'ground';
      } else if (currentScore < 900) {
        if (rand < 0.25) return 'highair';
        if (rand < 0.60) return 'midair';
        return 'ground';
      } else {
        if (rand < 0.35) return 'highair';
        if (rand < 0.70) return 'midair';
        return 'ground';
      }
    }

    function initGame() {
      player = new Player(W * 0.2, groundY);
      obstacles = [];
      particles = [];
      bossProjectiles = [];
      playerProjectiles = [];
      boss = null;
      bossStage = 0;
      nextBossScore = 300;
      bossCooldownTimer = 0;
      playerShootCooldown = 0;
      pickups = [];
      pickupTimer = 0;
      pickupInterval = 5;
      obstacleTimer = 0;
      obstacleInterval = 1.8;
      obstacleMinInterval = 1.4;
      speedMultiplier = 1;
      score = 0;
      background = new Background(W, H);
    }

    function gameLoop(timestamp) {
      requestAnimationFrame(gameLoop);

      if (lastTime === 0) lastTime = timestamp;
      let dt = (timestamp - lastTime) / 1000;
      if (dt > 0.1) dt = 0.016;
      lastTime = timestamp;

      // Update
      if (gameState === STATE.PLAYING) {
        player.update(dt, groundY);
        background.update(dt, speedMultiplier);

        // Obstacle spawning
        obstacleTimer += dt;
        if (obstacleTimer >= obstacleInterval) {
          obstacleTimer = 0;
          var obsType = getObstacleType(score);
          obstacles.push(new Obstacle(W + 50, groundY, obsType));
          obstacleInterval = obstacleMinInterval + Math.random() * 0.6;
        }

        // Obstacle update + collision
        for (let i = obstacles.length - 1; i >= 0; i--) {
          obstacles[i].update(dt, speedMultiplier);

          const playerBounds = player.getBounds();
          const obsBounds = obstacles[i].getBounds();
          if (rectsCollide(playerBounds, obsBounds)) {
            var dead = player.takeDamage();
            if (dead) {
              gameState = STATE.GAMEOVER;
              sound.playHit();
              endGame();
              break;
            } else {
              sound.playHit();
              // Destroy obstacle on collision (player smashes through)
              for (var ep = 0; ep < 8; ep++) {
                particles.push(new Particle(obstacles[i].x + obstacles[i].width / 2, obstacles[i].y + obstacles[i].height / 2));
              }
              obstacles.splice(i, 1);
            }
          }

          if (obstacles[i] && obstacles[i].isOffScreen && obstacles[i].isOffScreen()) {
            obstacles.splice(i, 1);
          }
        }

        // Scoring
        score += dt * 10;

        // Obstacle passed bonus
        for (const obs of obstacles) {
          if (!obs.passed && obs.x + obs.width < player.x) {
            obs.passed = true;
            score += 50;
            sound.playScore();
          }
        }

        // Difficulty scaling
        speedMultiplier = 1 + Math.floor(score / 100) * 0.15;
        if (speedMultiplier > 3) speedMultiplier = 3;

        // Dynamic min interval based on score
        if (score < 150) obstacleMinInterval = 1.4;
        else if (score < 350) obstacleMinInterval = 1.2;
        else if (score < 600) obstacleMinInterval = 1.0;
        else if (score < 900) obstacleMinInterval = 0.85;
        else obstacleMinInterval = 0.7;

        if (keys['Space'] || keys['ArrowUp']) {
          if (player.jump()) {
            for (let i = 0; i < 6; i++) {
              particles.push(new Particle(player.x + player.width / 2, player.y + player.height));
            }
            if (player.jumpsLeft === 0) {
              sound.playDoubleJump();
            } else {
              sound.playJump();
            }
          }
          keys['Space'] = false;
          keys['ArrowUp'] = false;
        }

        // ===== Boss System =====
        if (gameState === STATE.PLAYING) {

        // Player shooting (M key)
        playerShootCooldown -= dt;
        if (keys['KeyM']) {
          if (playerShootCooldown <= 0) {
            playerShootCooldown = 0.2;
            var px = player.x + player.width + 8;
            var py = player.y + player.height / 2;
            var lvl = player.powerLevel;
            if (lvl <= 0) {
              playerProjectiles.push(new PlayerProjectile(px, py));
            } else {
              var count = lvl === 1 ? 2 : (lvl === 2 ? 3 : 5);
              var spread = lvl === 1 ? 3 : (lvl === 2 ? 8 : 12);
              for (var si = 0; si < count; si++) {
                var offset = (si - (count - 1) / 2) * spread;
                var pp = new PlayerProjectile(px, py + offset);
                if (offset !== 0) {
                  var angle = offset > 0 ? 0.25 : -0.25;
                  if (lvl >= 3) angle *= (Math.abs(offset) / spread) * 1.5;
                  pp.vy = pp.vx * Math.sin(angle) * (offset > 0 ? 1 : -1) * (lvl >= 3 ? 1.5 : 1);
                }
                playerProjectiles.push(pp);
              }
            }
          }
        }

        // Pickup spawning
        pickupTimer += dt;
        if (pickupTimer >= pickupInterval) {
          pickupTimer = 0;
          pickupInterval = 3 + Math.random() * 5;
          if (Math.random() < 0.6) {
            // Energy orb
            var orbLvl = Math.random() < 0.5 ? 1 : (Math.random() < 0.6 ? 2 : 3);
            pickups.push(new PowerUp(W + 50, groundY, orbLvl));
          } else {
            // Health pack
            pickups.push(new HealthPack(W + 50, groundY));
          }
        }

        // Pickup update
        for (var pui = pickups.length - 1; pui >= 0; pui--) {
          pickups[pui].update(dt, speedMultiplier);
          if (pickups[pui].isOffScreen()) {
            pickups.splice(pui, 1);
          }
        }

        // Pickup collision
        var pb = player.getBounds();
        for (var pci = pickups.length - 1; pci >= 0; pci--) {
          if (rectsCollide(pb, pickups[pci].getBounds())) {
            var item = pickups[pci];
            if (item instanceof PowerUp) {
              player.powerLevel = item.level;
              player.powerTimer = item.level === 1 ? 8 : (item.level === 2 ? 12 : 16);
              sound.playScore();
              // Collect particles
              for (var cp = 0; cp < 5; cp++) {
                particles.push(new Particle(item.x, item.y));
              }
            } else if (item instanceof HealthPack) {
              if (player.hp < player.maxHp) {
                player.hp++;
                sound.playScore();
                for (var hp = 0; hp < 5; hp++) {
                  particles.push(new Particle(item.x, item.y));
                }
              }
            }
            pickups.splice(pci, 1);
          }
        }

        // Stage announcement timer
        if (stageAnnounceTimer > 0) stageAnnounceTimer -= dt;

        // Boss spawning
        if (!boss && bossCooldownTimer <= 0 && score >= nextBossScore) {
          bossStage++;
          var bType = getBossTypeForStage(bossStage);
          boss = new Boss(bossStage, bType);
          bossCooldownTimer = 3;
          stageAnnounceText = 'Stage ' + bossStage + ' — ' + boss.config.nameCN + ' 登场!';
          stageAnnounceTimer = 2.5;
        }
        if (bossCooldownTimer > 0 && !boss) {
          bossCooldownTimer -= dt;
        }

        // Boss update
        if (boss) {
          boss.update(dt);

          // Trigger special attack
          if (boss.specialCooldown <= 0 && boss.state === 'active' && boss.config.specials) {
            var spec = boss.triggerSpecial();
            if (spec === 'laserSweep') {
              boss.laserY = 30; boss.laserDir = 1;
            } else if (spec === 'bulletWall') {
              for (var bwx = 0; bwx < 6; bwx++) {
                var bwy = 30 + bwx * (groundY - 60) / 5;
                bossProjectiles.push(new BossProjectile(boss.x - boss.width/2, bwy, -boss.projectileSpeed, 0));
              }
            } else if (spec === 'deployMine') {
              for (var mn = 0; mn < 3; mn++) {
                boss.mines.push(new Mine(boss.x - boss.width/2 - mn*30, boss.y + (mn-1)*40));
              }
            } else if (spec === 'summonDrones') {
              if (boss.drones.length < 4) {
                for (var dn = 0; dn < 2; dn++) {
                  boss.drones.push(new Drone(boss.x - 40, boss.y + (dn-0.5)*60));
                }
              }
            }
          }

          // Laser sweep animation (Beam Lord)
          if (boss.specialState === 'laserSweep') {
            boss.laserY += boss.laserDir * 250 * dt;
            if (boss.laserY > groundY - 20) { boss.laserY = groundY - 20; boss.laserDir = -1; }
            if (boss.laserY < 30) { boss.laserY = 30; boss.laserDir = 1; boss.specialState = null; }
            // Collision: laser vs player
            var laserRect = { x: 0, y: boss.laserY - 2, w: W, h: 4 };
            if (rectsCollide(player.getBounds(), laserRect)) {
              var lDead = player.takeDamage();
              if (lDead) { gameState = STATE.GAMEOVER; sound.playHit(); endGame(); }
              else sound.playHit();
            }
          }

          // Dash charge (Berserker)
          if (boss.specialState === 'dashCharge') {
            if (boss.specialTimer < 1) {
              // Windup
            } else if (boss.specialTimer < 2) {
              boss.x -= 800 * dt;
              if (boss.x < 100) boss.x = 100;
              if (rectsCollide(player.getBounds(), boss.getBounds())) {
                var dDead = player.takeDamage();
                if (dDead) { gameState = STATE.GAMEOVER; sound.playHit(); endGame(); }
                else { sound.playHit(); player.takeDamage(); } // 2 HP damage
              }
            } else {
              boss.x += 400 * dt;
              if (boss.x >= boss.entryTargetX) { boss.x = boss.entryTargetX; boss.specialState = null; }
            }
          }

          // Chain detonate mines (Mine Deployer)
          if (boss.specialState === 'chainDetonate' && boss.specialTimer > 2) {
            for (var mi2 = boss.mines.length - 1; mi2 >= 0; mi2--) {
              for (var rp = 0; rp < 6; rp++) {
                var ra = (Math.PI * 2 / 6) * rp;
                var rvx = Math.cos(ra) * 120;
                var rvy = Math.sin(ra) * 120;
                bossProjectiles.push(new BossProjectile(boss.mines[mi2].x, boss.mines[mi2].y, rvx, rvy));
              }
              boss.mines.splice(mi2, 1);
            }
            boss.specialState = null;
          }

          // Coordinated barrage (Summoner)
          if (boss.specialState === 'coordinatedBarrage' && boss.specialTimer > 0.5 && boss.specialTimer < 0.55) {
            var bx2 = boss.x - boss.width / 2;
            var by2 = boss.y;
            bossProjectiles.push(new BossProjectile(bx2, by2, -boss.projectileSpeed, 0));
            for (var dbi = 0; dbi < boss.drones.length; dbi++) {
              var dr = boss.drones[dbi];
              bossProjectiles.push(new BossProjectile(dr.x, dr.y, -boss.projectileSpeed * 0.8, (dr.y - player.y) * 0.5));
            }
            boss.specialState = null;
          }

          // Boss firing (basic attack)
          if (boss.shouldFire()) {
            var bx = boss.x - boss.width / 2;
            var by = boss.y;
            var burstCount = boss.enraged ? 3 : (1 + Math.floor(Math.random() * 3));
            for (var bi = 0; bi < burstCount; bi++) {
              (function(delay) {
                setTimeout(function() {
                  if (gameState !== STATE.PLAYING || !boss || boss.state !== 'active') return;
                  var spd = boss.projectileSpeed;
                  if (boss.bossType === 'berserker') {
                    // Shotgun burst
                    for (var sg = 0; sg < 9; sg++) {
                      var sga = -Math.PI/4 + (Math.PI/4/8) * sg;
                      bossProjectiles.push(new BossProjectile(bx, by, Math.cos(sga) * -spd, Math.sin(sga) * spd));
                    }
                  } else {
                    var pattern = Math.random() < 0.5 ? 'horizontal' : 'diagonal';
                    var vx = pattern === 'diagonal' ? -spd * 0.87 : -spd;
                    var vy = pattern === 'diagonal' ? -spd * 0.5 : 0;
                    bossProjectiles.push(new BossProjectile(bx, by, vx, vy));
                  }
                }, delay * (boss.enraged ? 80 : 150));
              })(bi);
            }
          }

          // Drone firing (Summoner)
          for (var dri = 0; dri < boss.drones.length; dri++) {
            if (boss.drones[dri].shouldFire()) {
              bossProjectiles.push(new BossProjectile(boss.drones[dri].x, boss.drones[dri].y, -200, 0));
            }
          }

          // Boss defeated — explosion particles
          if (boss.state === 'defeated') {
            for (var ep = 0; ep < 20; ep++) {
              particles.push(new Particle(boss.x, boss.y));
            }
            score += 300;
            sound.playHit();
            bossProjectiles = [];
            boss = null;
            bossCooldownTimer = 3;
            nextBossScore = score + 400 + bossStage * 100;
          }
        }

        // Update boss projectiles
        for (var bpi = bossProjectiles.length - 1; bpi >= 0; bpi--) {
          bossProjectiles[bpi].update(dt);
          if (bossProjectiles[bpi].isOffScreen()) {
            bossProjectiles.splice(bpi, 1);
          }
        }

        // Update player projectiles
        for (var ppi = playerProjectiles.length - 1; ppi >= 0; ppi--) {
          playerProjectiles[ppi].update(dt);
          if (playerProjectiles[ppi].isOffScreen()) {
            playerProjectiles.splice(ppi, 1);
          }
        }

        // Collision: player projectile vs boss projectile
        for (var ppi2 = playerProjectiles.length - 1; ppi2 >= 0; ppi2--) {
          var pp = playerProjectiles[ppi2];
          for (var bpi2 = bossProjectiles.length - 1; bpi2 >= 0; bpi2--) {
            var bp = bossProjectiles[bpi2];
            if (rectsCollide(pp.getBounds(), bp.getBounds())) {
              playerProjectiles.splice(ppi2, 1);
              bossProjectiles.splice(bpi2, 1);
              score += 10;
              sound.playScore();
              break;
            }
          }
        }

        // Collision: player projectile vs obstacle
        for (var ppi4 = playerProjectiles.length - 1; ppi4 >= 0; ppi4--) {
          for (var oi = obstacles.length - 1; oi >= 0; oi--) {
            if (rectsCollide(playerProjectiles[ppi4].getBounds(), obstacles[oi].getBounds())) {
              playerProjectiles.splice(ppi4, 1);
              var obsDead = obstacles[oi].takeDamage();
              if (obsDead) {
                for (var odp = 0; odp < 6; odp++) {
                  particles.push(new Particle(obstacles[oi].x + obstacles[oi].width / 2, obstacles[oi].y + obstacles[oi].height / 2));
                }
                score += 25;
                obstacles.splice(oi, 1);
              }
              break;
            }
          }
        }

        // Collision: player projectile vs boss
        if (boss && (boss.state === 'active' || boss.state === 'entering')) {
          for (var ppi3 = playerProjectiles.length - 1; ppi3 >= 0; ppi3--) {
            if (rectsCollide(playerProjectiles[ppi3].getBounds(), boss.getBounds())) {
              playerProjectiles.splice(ppi3, 1);
              var defeated = boss.takeDamage();
              if (defeated) {
                // boss.state is now 'defeated', handled above next frame
              }
              break;
            }
          }
        }

        // Collision: boss projectile vs player
        var playerBounds = player.getBounds();
        for (var bpi3 = 0; bpi3 < bossProjectiles.length; bpi3++) {
          if (rectsCollide(playerBounds, bossProjectiles[bpi3].getBounds())) {
            bossProjectiles.splice(bpi3, 1);
            var dead = player.takeDamage();
            if (dead) {
              gameState = STATE.GAMEOVER;
              sound.playHit();
              endGame();
            } else {
              sound.playHit();
            }
            break;
          }
        }
        } // close if (STATE.PLAYING) for boss section
      } else if (gameState === STATE.IDLE) {
        if (keys['Space'] || keys['ArrowUp']) {
          gameState = STATE.PLAYING;
          obstacles = [];
          bossProjectiles = [];
          playerProjectiles = [];
          pickups = [];
          particles = [];
          document.getElementById('start-hint').style.display = 'none';
          if (player.jump()) {
            for (let i = 0; i < 6; i++) {
              particles.push(new Particle(player.x + player.width / 2, player.y + player.height));
            }
            sound.playJump();
          }
          keys['Space'] = false;
          keys['ArrowUp'] = false;
        }
      } else if (gameState === STATE.GAMEOVER) {
        if (keys['Space'] || keys['ArrowUp']) {
          resetGame();
          keys['Space'] = false;
          keys['ArrowUp'] = false;
        }
      }

      // Particle update
      for (let i = particles.length - 1; i >= 0; i--) {
        particles[i].update(dt);
        if (!particles[i].alive) particles.splice(i, 1);
      }

      // Render
      ctx.clearRect(0, 0, W, H);
      const grad = ctx.createLinearGradient(0, 0, 0, H);
      grad.addColorStop(0, '#0a0a1a');
      grad.addColorStop(1, '#1a0a2e');
      ctx.fillStyle = grad;
      ctx.fillRect(0, 0, W, H);

      background.draw(ctx, W, groundY);

      ctx.fillStyle = '#00f0ff';
      ctx.fillRect(0, groundY, W, 2);

      // Hearts UI
      for (var h = 0; h < player.maxHp; h++) {
        ctx.fillStyle = h < player.hp ? '#ff3355' : '#333';
        ctx.shadowColor = h < player.hp ? 'rgba(255,50,80,0.6)' : 'transparent';
        ctx.shadowBlur = 6;
        ctx.font = '24px Arial';
        ctx.fillText('♥', 20 + h * 30, 40);
      }
      ctx.shadowBlur = 0;

      // Score
      ctx.fillStyle = '#ffd700';
      ctx.font = 'bold 28px "Courier New", monospace';
      ctx.shadowColor = 'rgba(255, 215, 0, 0.6)';
      ctx.shadowBlur = 8;
      ctx.textAlign = 'right';
      ctx.fillText('SCORE: ' + Math.floor(score), W - 30, 50);
      ctx.shadowBlur = 0;

      // Stage counter
      ctx.fillStyle = '#fff';
      ctx.font = 'bold 14px "Courier New", monospace';
      ctx.textAlign = 'right';
      ctx.fillText('STAGE ' + (bossStage + (boss ? 0 : 1)), W - 30, 78);

      // Stage announcement
      if (stageAnnounceTimer > 0) {
        var announceAlpha = Math.min(1, stageAnnounceTimer);
        ctx.fillStyle = 'rgba(255, 255, 255, ' + announceAlpha + ')';
        ctx.font = 'bold 22px "Courier New", monospace';
        ctx.textAlign = 'center';
        ctx.fillText(stageAnnounceText, W / 2, 100);
      }

      // Power-up indicator
      if (player.powerLevel > 0) {
        var puColors = ['', '#44ff44', '#4488ff', '#ffd700'];
        ctx.fillStyle = puColors[player.powerLevel];
        ctx.font = 'bold 16px "Courier New", monospace';
        ctx.textAlign = 'right';
        ctx.fillText('PWR Lv' + player.powerLevel + ' ' + player.powerTimer.toFixed(1) + 's', W - 30, 100);
      }

      ctx.textAlign = 'start';

      // Laser sweep rendering
      if (boss && boss.specialState === 'laserSweep') {
        ctx.fillStyle = 'rgba(204, 68, 255, 0.5)';
        ctx.fillRect(0, boss.laserY - 2, W, 4);
        ctx.fillStyle = 'rgba(255, 255, 255, 0.6)';
        ctx.fillRect(0, boss.laserY, W, 1);
      }

      // Mine and drone rendering
      if (boss) {
        for (var bmi = 0; bmi < boss.mines.length; bmi++) boss.mines[bmi].draw(ctx);
        for (var bdi = 0; bdi < boss.drones.length; bdi++) boss.drones[bdi].draw(ctx);
      }

      // Boss projectiles
      for (const bp of bossProjectiles) {
        bp.draw(ctx);
      }

      // Pickups
      for (const pu of pickups) {
        pu.draw(ctx);
      }

      // Obstacles
      for (const obs of obstacles) {
        obs.draw(ctx);
      }

      // Boss
      if (boss) boss.draw(ctx);

      player.draw(ctx);

      // Player projectiles
      for (const pp of playerProjectiles) {
        pp.draw(ctx);
      }

      for (const p of particles) {
        p.draw(ctx);
      }
    }

    // ===== Init =====
    resize();
    initGame();
    requestAnimationFrame(gameLoop);

    window.addEventListener('resize', resize);

    const keys = {};

    window.addEventListener('keydown', function(e) {
      keys[e.code] = true;
      if (e.code === 'Space' || e.code === 'ArrowUp') {
        e.preventDefault();
      }
    });

    window.addEventListener('keyup', function(e) {
      keys[e.code] = false;
      if (e.code === 'Space' || e.code === 'ArrowUp') {
        e.preventDefault();
      }
    });
  </script>
</body>
</html>
